
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Robotic Arm Controller</title>
    <style>
        /* Add your CSS styles here */
        canvas {
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <h1>2D Robotic Arm Controller</h1>
    <canvas id="robotic-arm-canvas" width="500" height="500"></canvas>
    <div id="controls">
        <!-- Controls for inputting joint angles and displaying end-effector position -->
        <label for="joint1">Joint 1 Angle (θ1):</label>
        <input type="number" id="joint1" value="0"><br>
        <label for="joint2">Joint 2 Angle (θ2):</label>
        <input type="number" id="joint2" value="0"><br>
        <button onclick="animateRobot()">Animate</button>
    </div>

    <script src="RoboticLibrary.js"></script>
   <script>
    const canvas = document.getElementById('robotic-arm-canvas');
const ctx = canvas.getContext('2d');

function drawRobotArm(endEffectorPosition) {
    // Clear the canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw the robot arm
    const baseX = canvas.width / 2;
    const baseY = canvas.height / 2;
    const joint1Length = 100;
    const joint2Length = 100;

    const joint1X = baseX + joint1Length * Math.cos(endEffectorPosition[0]);
    const joint1Y = baseY + joint1Length * Math.sin(endEffectorPosition[0]);

    const endEffectorX = joint1X + joint2Length * Math.cos(endEffectorPosition[0] + endEffectorPosition[1]);
    const endEffectorY = joint1Y + joint2Length * Math.sin(endEffectorPosition[0] + endEffectorPosition[1]);

    ctx.beginPath();
    ctx.moveTo(baseX, baseY);
    ctx.lineTo(joint1X, joint1Y);
    ctx.lineTo(endEffectorX, endEffectorY);
    ctx.stroke();
}
function animateRobot() {
    const joint1 = parseFloat(document.getElementById('joint1').value) * Math.PI / 180;
    const joint2 = parseFloat(document.getElementById('joint2').value) * Math.PI / 180;

    const linkLengths = [100, 100]; // Example lengths, you can adjust as needed

    const frames = 100;
    const joint1Step = joint1 / frames;
    const joint2Step = joint2 / frames;

    let currentJoint1 = 0;
    let currentJoint2 = 0;

    const animate = () => {
        drawRobotArm([currentJoint1, currentJoint2]);

        currentJoint1 += joint1Step;
        currentJoint2 += joint2Step;

        if (currentJoint1 <= joint1 && currentJoint2 <= joint2) {
            requestAnimationFrame(animate);
        } else {
            // Save the final joint angles
            currentJoint1 = joint1;
            currentJoint2 = joint2;
        }
    };

    animate();
}


   </script>
</body>
</html>
