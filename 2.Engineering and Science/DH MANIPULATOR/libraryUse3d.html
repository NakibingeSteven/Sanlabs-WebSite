<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Robotic Arm Simulation</title>
    <style>
        body { margin: 0; }
        canvas { width: 100%; height: 100% }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Setup scene, camera, and renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Create base
        const baseGeometry = new THREE.BoxGeometry(2, 0.5, 2);
        const baseMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const base = new THREE.Mesh(baseGeometry, baseMaterial);
        scene.add(base);

        // Create first arm segment
        const segment1Geometry = new THREE.BoxGeometry(0.5, 3, 0.5);
        const segment1Material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const segment1 = new THREE.Mesh(segment1Geometry, segment1Material);
        segment1.position.y = 1.5; // Offset to sit on top of base
        scene.add(segment1);

        // Create second arm segment
        const segment2Geometry = new THREE.BoxGeometry(0.5, 2.5, 0.5);
        const segment2Material = new THREE.MeshBasicMaterial({ color: 0x0000ff });
        const segment2 = new THREE.Mesh(segment2Geometry, segment2Material);
        segment2.position.y = 3.75; // Offset to sit on top of first segment
        scene.add(segment2);

        // Create third arm segment
        const segment3Geometry = new THREE.BoxGeometry(0.5, 2, 0.5);
        const segment3Material = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const segment3 = new THREE.Mesh(segment3Geometry, segment3Material);
        segment3.position.y = 5.75; // Offset to sit on top of second segment
        scene.add(segment3);

        // Set camera position
        camera.position.z = 10;

        // Render loop
        const animate = function () {
            requestAnimationFrame(animate);

            // Rotate arm segments (example movement)
            segment1.rotation.x += 0.01;
            segment2.rotation.y += 0.02;
            segment3.rotation.z += 0.03;

            renderer.render(scene, camera);
        };

        animate();
    </script>
</body>
</html>
