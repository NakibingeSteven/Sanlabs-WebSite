<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>
        //
        var VsInput = document.getElementById("Vs");
        var VfInput = document.getElementById("Vf");
        var IfInput = document.getElementById("If");

        function led() {
            var ledV = document.getElementById("Vs").value - document.getElementById("Vf").value;
            var ledRv = ledV / document.getElementById("If").value * 1e3;
            ledRvf = convertToExpo(ledRv);

            if (VsInput.value && VfInput.value && IfInput.value) {
                document.getElementById("R").value = ledRvf;
                ledW = document.getElementById("Vs").value - document.getElementById("Vf").value;
                ledWf = (ledW * document.getElementById("If").value) / 1000;
                ledWf = convertToExpo(ledWf);
                document.getElementById("W").value = ledWf;
            } else if (VsInput.value === '' && VfInput.value === '' && IfInput.value === '') {
                document.getElementById("R").value = '';
                document.getElementById("W").value = '';
            } else if (VsInput.value || VfInput.value || IfInput.value) {
                document.getElementById("R").value = '';
                document.getElementById("W").value = '';
            }

            // chrome: change type to text to assign value 'infinity'
            // firefox: if type = number, doesnt convert to expo
            if (VsInput.value == 0 || IfInput.value == 0) {
                document.getElementById("R").type = 'text';
                document.getElementById("W").type = 'text';
            }
            // else {
            //     document.getElementById("R").type = 'number';
            //     document.getElementById("W").type = 'number';
            // }

            if (document.getElementById("R").value == '0' || document.getElementById("W").value == '0') {
                document.getElementById("R").value = "Infinity";
                document.getElementById("W").value = "Infinity";
            }

            var vsVal = parseFloat(VsInput.value);
            var vfVal = parseFloat(VfInput.value);
            if (vfVal > vsVal) {
                $("#vf_parent").addClass('warning-msg');
                $("#warning-msg-tip").css('display', 'inline');
                $(VfInput).val("");
                $(IfInput).val("");
                document.getElementById("R").value = '';
                document.getElementById("W").value = '';

            } else {
                $("#vf_parent").removeClass('warning-msg');
                $("#warning-msg-tip").css('display', 'none');
            }

        }

        VsInput.addEventListener("change", led);
        VfInput.addEventListener("change", led);
        IfInput.addEventListener("change", led);

    </script>
</body>

</html>
