<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .tooltip {
            position: relative;
            display: inline-block;
            border-bottom: 1px dotted black;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 150px;
            background-color: #f4f5fa;
            color: black;
            text-align: center;
            border-radius: 6px;
            padding: 5px 3px;

            /* Position the tooltip */
            position: absolute;
            z-index: 1;
            top: -5px;
            right: 105%;
        }

        @media (max-width: 720px) {
            .tooltip .tooltiptext {
                width: 150px;
                top: 100%;
                left: 50%;
                margin-left: -75px;
                /* Use half of the width (150/2 = 75), to center the tooltip */
            }
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
        }

        label {
            display: inline-block;
            width: 275px;
            text-align: right;

        }

        @media (max-width:720px) {
            label {
                text-align: left;
            }

            .unitslabel {
                width: 40px;
            }
        }
    </style>
</head>

<body>
    <form>
        <div style="margin-bottom:10px;">
            <label for="input-units" class="unitslabel">Units</label>
            <input type="radio" id="input-units-inch" value="mm" name="units" checked><label for="mm"
                style="width:64px;padding-left:3px;padding-right:5px;">Module</label>
            <input type="radio" id="input-units-mm" value="in" name="units"><label for="in"
                style="width:32px;padding-left:6px;">DP</label>
        </div>


        <div style="margin-bottom:10px;">
            <label>
                <div class="tooltip">DP/Module*<span class="tooltiptext">Diametral Pitch (1/in), Module (mm)</span>
                </div>
            </label>
            <input type="text" id="input-module" size="35" placeholder="Module (mm)">

        </div>

        <div style="margin-bottom:10px;">
            <label>
                <div class="tooltip">Normal Pressure Angle*<span class="tooltiptext">Common values: 20, 14.5, 25</span>
                </div>
            </label>
            <input type="text" id="input-pangle" size="35" placeholder="Pressure Angle (degrees)">

        </div>

        <div style="margin-bottom:10px;">
            <label for="rackform">
                <div class="tooltip">ISO Rack Form<span class="tooltiptext">Type C for most applications</span>
                </div>
            </label>
            <select name="rackform" id="rackform">
                <option value="C">C</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>

        </div>

        <div style="margin-bottom:10px;">
            <label for="input-testpindia">
                <div class="tooltip">Test Pin Diameter<span class="tooltiptext">Test Pin Diameter (mm or inch)</span>
                </div>
            </label>
            <input type="text" id="input-testpindia" size="35" placeholder="Test Pin Diameter">
        </div>

        <div style="margin-bottom:10px;">
            <label for="input-back">
                <div class="tooltip">Pitchline to Datum<span class="tooltiptext">Distance from Back of Rack to Pitch
                        Line</span>
                </div>
            </label>
            <input type="text" id="input-back" size="35" placeholder="Distance to Pitch Line">
        </div>


        <div style="margin-bottom:10px;">
            <label for="precision">Number of Decimal Places</label>
            <select name="precision" id="precision">
                <option value="4">4</option>
                <option value="8">8</option>
                <option value="7">7</option>
                <option value="6">6</option>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
                <option value="0">0</option>
            </select>

        </div>

        <div style="margin:auto; width:40%">
            <button text="Calculate" id="button-calculate" onclick="calculate();return false;">Calculate</button>
            <button text="Clear" id="button-clear" onclick="clearInputs();return false;">Clear</button>
            <button text="Copy" id="button-copy" onclick="copyResults();return false;">Copy</button>
        </div>
        <div style="margin:0;width:80%">
            <textarea cols="70" rows="26" id="areaResults"
                style="margin-top:10px; font-family:'Courier New';tab-size:1;"></textarea>
        </div>
    </form>

</body>

</html>
