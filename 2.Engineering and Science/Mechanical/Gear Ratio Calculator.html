<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

            display: inline-block;
            width: 275px;
            text-align: right;

        }

        @media (max-width:720px) {

    </style>
</head>

<body>
    <form>
        <div style="margin-bottom:10px;">
            <label>Input Speed (rpm)</label>
            <input type="text" id="input-speed" size="50" placeholder="Speed of Input Gear (optional)">
        </div>
        <div style="margin-bottom:10px;">
            <label>Number of Teeth: Input Gear</label>
            <input type="text" id="input-1" size="50" placeholder="Number of Teeth on First Gear">
        </div>
        <div style="margin-bottom:10px;">
            <label>Number of Teeth: Gear 2</label>
            <input type="text" id="input-2" size="50" placeholder="Number of Teeth on Second Gear">
            <label for="shaft2">On same shaft as the Input Gear?</label>
            <input type="checkbox" id="shaft2" name="shaft2" value="Checked">

        </div>
        <div style="margin-bottom:10px;">
            <label>Number of Teeth: Gear 3</label>
            <input type="text" id="input-3" size="50" placeholder="Number of Teeth on Third Gear">
            <label for="shaft2">On same shaft as Gear 2?</label>
            <input type="checkbox" id="shaft3" name="shaft3" value="Checked">

        </div>
        <div style="margin-bottom:10px;">
            <label>Number of Teeth: Gear 4</label>
            <input type="text" id="input-4" size="50" placeholder="Number of Teeth on Fourth Gear">
            <label for="shaft2">On same shaft as Gear 3?</label>
            <input type="checkbox" id="shaft4" name="shaft4" value="Checked">

        </div>
        <div style="margin-bottom:10px;">
            <label>Number of Teeth: Gear 5</label>
            <input type="text" id="input-5" size="50" placeholder="Number of Teeth on Fifth Gear">
            <label for="shaft2">On same shaft as Gear 4?</label>
            <input type="checkbox" id="shaft5" name="shaft5" value="Checked">

        </div>
        <div style="margin-bottom:10px;">
            <label>Number of Teeth: Gear 6</label>
            <input type="text" id="input-6" size="50" placeholder="Number of Teeth on Sixth Gear">
            <label for="shaft2">On same shaft as Gear 5?</label>
            <input type="checkbox" id="shaft6" name="shaft6" value="Checked">

        </div>
        <div style="margin-bottom:10px;">
            <label>Number of Teeth: Gear 7</label>
            <input type="text" id="input-7" size="50" placeholder="Number of Teeth on Seventh Gear">
            <label for="shaft2">On same shaft as Gear 6?</label>
            <input type="checkbox" id="shaft7" name="shaft7" value="Checked">

        </div>
        <div style="margin-bottom:10px;">
            <label>Number of Teeth: Gear 8</label>
            <input type="text" id="input-8" size="50" placeholder="Number of Teeth on Eighth Gear">
            <label for="shaft2">On same shaft as Gear 7?</label>
            <input type="checkbox" id="shaft8" name="shaft8" value="Checked">

        </div>
        <div style="margin:auto; width:40%">
            <button text="Calculate" id="button-calculate" onclick="calculate();return false;">Calculate</button>
            <button text="Clear" id="button-clear" onclick="clearInputs();return false;">Clear</button>
            <button text="Copy" id="button-copy" onclick="copyResults();return false;">Copy</button>
        </div>
        <div style="margin:0;width:80%">
            <textarea cols="70" rows="10" id="areaResults"
                style="margin-top:10px; font-family:'Courier New';tab-size:1;"></textarea>
        </div>
    </form>

    <div id="s-ab1fd25b-48f5-497e-a867-a53f162f42eb" class="shg-c  ">
        <div class="shg-rich-text shg-theme-text-content"><p>An example gear-train is shown below: The Input Gear meshes with Gear 2. Gear 3 is on the same shaft as Gear 2, and meshes with Gear 4. Gear 5 is on the same shaft as Gear 4, and meshes with Gear 6. The "same shaft" boxes would be checked on Gears 3 and 5 only.</p></div>
        <img data-src="geartrain.jpeg" width="" height="" style="" alt="" class="shogun-image  shogun-lazyload">
    
  
      </div>
    <script>
        function logQA(message) {
            //send the message. the message is an object, i.e.:
            //const obj = {name: "John", age: 30, city: "New York"};
            var client = new XMLHttpRequest();
            client.open("POST", "https://oilviscositychart.com/logs/log.php");
            client.setRequestHeader("Content-Type", "application/json");
            client.send(JSON.stringify(message));
            return false;
        }

        function formatDate(d) {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
            return d.getDate().toString().padStart(2, '0') + "-" + months[d.getMonth()] + "-" + d.getFullYear();
        }

        function copyResults() {
            var copyText = document.getElementById('areaResults');
            copyText.select();
            //copyText.setSelectionRange(0, 99999); /*For mobile devices*/
            document.execCommand("copy");
        }

        document.getElementById('button-copy').onclick = function () {
            copyResults();
            return false;
        }

        document.getElementById('button-calculate').onclick = function () {
            calculate();
            return false;
        }

        document.getElementById('button-clear').onclick = function () {
            document.getElementById('input-speed').value = '';
            document.getElementById('input-1').value = '';
            document.getElementById('input-2').value = '';
            document.getElementById('input-3').value = '';
            document.getElementById('input-4').value = '';
            document.getElementById('input-5').value = '';
            document.getElementById('input-6').value = '';
            document.getElementById('input-7').value = '';
            document.getElementById('input-8').value = '';

            document.getElementById('shaft2').checked = false;
            document.getElementById('shaft3').checked = false;
            document.getElementById('shaft4').checked = false;
            document.getElementById('shaft5').checked = false;
            document.getElementById('shaft6').checked = false;
            document.getElementById('shaft7').checked = false;
            document.getElementById('shaft8').checked = false;
            return false;
        }


        function calculate() {
            //var precision = document.getElementsByName('contact[note][Number of Decimal Places]')[0].value;
            var precision = 4;
            var speed1 = parseFloat(document.getElementById('input-speed').value);
            console.log(speed1)
            var teeth1 = parseFloat(document.getElementById('input-1').value);
            var teeth2 = parseFloat(document.getElementById('input-2').value);
            var teeth3 = parseFloat(document.getElementById('input-3').value);
            var teeth4 = parseFloat(document.getElementById('input-4').value);
            var teeth5 = parseFloat(document.getElementById('input-5').value);
            var teeth6 = parseFloat(document.getElementById('input-6').value);
            var teeth7 = parseFloat(document.getElementById('input-7').value);
            var teeth8 = parseFloat(document.getElementById('input-8').value);

            logQA({ 'page': "ratio", 'numteeth': teeth1, 'module': teeth2, 'pangle': teeth3, 'pindia': teeth4, 'param5': teeth5, 'param6': teeth6, 'param7': teeth7, 'param8': teeth8, 'param9': speed1 })



            var shaft2 = document.getElementById('shaft2').checked;
            var shaft3 = document.getElementById('shaft3').checked;
            var shaft4 = document.getElementById('shaft4').checked;
            var shaft5 = document.getElementById('shaft5').checked;
            var shaft6 = document.getElementById('shaft6').checked;
            var shaft7 = document.getElementById('shaft7').checked;
            var shaft8 = document.getElementById('shaft8').checked;


            console.log(shaft2);
            var ratio1 = 1;
            var ratio2;
            var ratio3;
            var ratio4;
            var ratio5;
            var ratio6;
            var ratio7;
            var ratio8;

            var finalRatio = 1;
            var keepGoing = true;

            if (shaft2) {
                ratio2 = ratio1;
            }
            else {
                ratio2 = teeth1 / teeth2;
            }

            if (shaft3) {
                ratio3 = ratio2;
                if (isNaN(ratio3) || !(isFinite(ratio3))) {
                    finalRatio = ratio2;
                    keepGoing = false;
                }
            }
            else {
                ratio3 = ratio2 * teeth2 / teeth3;
                if (isNaN(ratio3) || !(isFinite(ratio3))) {
                    finalRatio = ratio2;
                    keepGoing = false;
                }
            }
            if (shaft4 && keepGoing) {
                ratio4 = ratio3;
                if (isNaN(ratio4) || !isFinite(ratio4)) {
                    finalRatio = ratio3;
                    keepGoing = false;
                }
            }
            else if (keepGoing) {
                ratio4 = ratio3 * teeth3 / teeth4;
                if (isNaN(ratio4) || !isFinite(ratio4)) {
                    finalRatio = ratio3;
                    keepGoing = false;
                }
            }
            if (shaft5 && keepGoing) {
                ratio5 = ratio4;
                if (isNaN(ratio5) || !isFinite(ratio5)) {
                    finalRatio = ratio4;
                    keepGoing = false;
                }
            }
            else if (keepGoing) {
                ratio5 = ratio4 * teeth4 / teeth5;
                if (isNaN(ratio5) || !isFinite(ratio5)) {
                    finalRatio = ratio4;
                    keepGoing = false;
                }
            }
            if (shaft6 && keepGoing) {
                ratio6 = ratio5;
                if (isNaN(ratio6) || !isFinite(ratio6)) {
                    finalRatio = ratio5;
                    keepGoing = false;
                }
            }
            else if (keepGoing) {
                ratio6 = ratio5 * teeth5 / teeth6;
                if (isNaN(ratio6) || !isFinite(ratio6)) {
                    finalRatio = ratio5;
                    keepGoing = false;
                }
            }
            if (shaft7 && keepGoing) {
                ratio7 = ratio6;
                if (isNaN(ratio7) || !isFinite(ratio7)) {
                    finalRatio = ratio6;
                    keepGoing = false;
                }
            }
            else if (keepGoing) {
                ratio7 = ratio6 * teeth6 / teeth7;
                if (isNaN(ratio7) || !isFinite(ratio7)) {
                    finalRatio = ratio6;
                    keepGoing = false;
                }
            }
            if (shaft8 && keepGoing) {
                ratio8 = ratio7;
                if (isNaN(ratio8) || !isFinite(ratio8)) {
                    finalRatio = ratio7;
                    keepGoing = false;
                }
                else if (keepGoing) {
                    finalRatio = ratio8;
                    keepGoing = false;
                }
            }
            else if (keepGoing) {
                ratio8 = ratio7 * teeth7 / teeth8;
                if (isNaN(ratio8) || !isFinite(ratio8)) {
                    finalRatio = ratio7;
                    keepGoing = false;
                }
                else {
                    finalRatio = ratio8;
                    keepGoing = false;
                }
            }

            if (isNaN(speed1)) {
                speed1 = "Undefined";
            }
            var outputspeed = (finalRatio * speed1).toFixed(precision);
            if (isNaN(outputspeed)) {
                outputspeed = "Undefined";
            }

            textToWrite = "Gear Ratio:\t" + finalRatio.toFixed(precision) + "\n\n"


            textToWrite = textToWrite + "Input Speed:\t" + speed1;
            textToWrite = textToWrite + "\n" + "Output Speed:" + "\t" + outputspeed + "\n\n\u00A9 Evolvent Design, " + new Date().getFullYear() + "\nhttps://evolventdesign.com/pages/gear-ratio-calculator";
            //  textToWrite = textToWrite + "\n\n" + ratio1 + ratio2 + ratio3 + ratio4 + ratio5 + ratio6 + ratio7 + ratio8;
            document.getElementById('areaResults').value = textToWrite;



        }
    </script>
</body>

</html>
