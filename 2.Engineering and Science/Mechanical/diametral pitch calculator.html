<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <form>
        <div style="margin-bottom:10px;">
            <label>Module (mm)</label>
            <input type="text" id="input-module" size="45" placeholder="Module">
        </div>
        <div style="margin-bottom:10px;">
            <label>Diametral Pitch (1/inch)</label>
            <input type="text" id="input-dp" size="45" placeholder="Diametral Pitch">
        </div>
        <div style="margin-bottom:10px;">
            <label>Circular Pitch (inch)</label>
            <input type="text" id="input-cp" size="45" placeholder="Circular Pitch">
        </div>
        <div style="margin-bottom:10px;">
            <label>Threads per Inch (1/inch)</label>
            <input type="text" id="input-tpi" size="45" placeholder="Threads per Inch">
        </div>
        <div style="margin-bottom:10px;">
            <label for="precision"># of Decimal Places</label>
            <select name="precision" id="precision">
                <option value="3">3</option>
                <option value="8">8</option>
                <option value="7">7</option>
                <option value="6">6</option>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
                <option value="0">0</option>
            </select>

        </div>

        <div style="margin:auto; width:40%">
            <button text="Calculate" id="button-calculate" onclick="calculate();return false;">Calculate</button>
            <button text="Clear" id="button-clear" onclick="clearInputs();return false;">Clear</button>
            <button text="Copy" id="button-copy" onclick="copyResults();return false;">Copy</button>
        </div>
        <div style="margin:auto;width:80%">
            <textarea cols="70" rows="11" id="areaResults"
                style="margin-top:10px; font-family:'Courier New';tab-size:1;"></textarea>
        </div>

        <script>
            var validTest = true;
            var precision;

            function logQA(message) {
                //send the message. the message is an object, i.e.:
                //const obj = {name: "John", age: 30, city: "New York"};
                var client = new XMLHttpRequest();
                client.open("POST", "https://oilviscositychart.com/logs/log.php");
                client.setRequestHeader("Content-Type", "application/json");
                client.send(JSON.stringify(message));
                return false;
            }

            function formatDate(d) {
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
                return d.getDate().toString().padStart(2, '0') + "-" + months[d.getMonth()] + "-" + d.getFullYear();
            }

            function copyResults() {
                var copyText = document.getElementById('areaResults');
                copyText.select();
                //copyText.setSelectionRange(0, 99999); /*For mobile devices*/
                document.execCommand("copy");
            }


            document.getElementById('button-copy').onclick = function () {
                copyResults();
                return false;
            }

            document.getElementById('button-calculate').onclick = function () {
                calculate();
                return false;
            }

            document.getElementById('button-clear').onclick = function () {
                document.getElementById('input-module').value = '';
                document.getElementById('input-cp').value = '';
                document.getElementById('input-dp').value = '';
                document.getElementById('input-tpi').value = '';
                document.getElementById('input-module').disabled = false;
                document.getElementById('input-cp').disabled = false;
                document.getElementById('input-dp').disabled = false;
                document.getElementById('input-tpi').disabled = false;
                return false;
            }


            // Disable other boxes once you start typing in one
            document.getElementById('input-module').onchange = function () {
                if (document.getElementById('input-module').value != '') {
                    document.getElementById('input-cp').disabled = true;
                    document.getElementById('input-dp').disabled = true;
                    document.getElementById('input-tpi').disabled = true;
                }
                else {
                    document.getElementById('input-cp').disabled = false;
                    document.getElementById('input-dp').disabled = false;
                    document.getElementById('input-tpi').disabled = false;
                }
                return false;
            }
            document.getElementById('input-cp').onchange = function () {
                if (document.getElementById('input-cp').value != '') {
                    document.getElementById('input-module').disabled = true;
                    document.getElementById('input-dp').disabled = true;
                    document.getElementById('input-tpi').disabled = true;
                }
                else {
                    document.getElementById('input-module').disabled = false;
                    document.getElementById('input-dp').disabled = false;
                    document.getElementById('input-tpi').disabled = false;
                }
                return false;
            }
            document.getElementById('input-dp').onchange = function () {
                if (document.getElementById('input-dp').value != '') {
                    document.getElementById('input-cp').disabled = true;
                    document.getElementById('input-module').disabled = true;
                    document.getElementById('input-tpi').disabled = true;
                }
                else {
                    document.getElementById('input-cp').disabled = false;
                    document.getElementById('input-module').disabled = false;
                    document.getElementById('input-tpi').disabled = false;
                }
                return false;
            }
            document.getElementById('input-tpi').onchange = function () {
                if (document.getElementById('input-tpi').value != '') {
                    document.getElementById('input-cp').disabled = true;
                    document.getElementById('input-module').disabled = true;
                    document.getElementById('input-dp').disabled = true;
                }
                else {
                    document.getElementById('input-cp').disabled = false;
                    document.getElementById('input-module').disabled = false;
                    document.getElementById('input-dp').disabled = false;
                }
                return false;
            }

            function calculate() {
                validTest = true;

                precision = parseInt(document.getElementById('precision').value);
                console.log("precision:", precision);
                var iModule = parseFloat(document.getElementById('input-module').value);
                var iCP = parseFloat(document.getElementById('input-cp').value);
                var iDP = parseFloat(document.getElementById('input-dp').value);
                var iTPI = parseFloat(document.getElementById('input-tpi').value);

                logQA({ 'page': "gearpitch", 'module': iModule, 'param5': iCP, 'param6': iDP, 'param7': iTPI });

                if (isNaN(iModule) && isNaN(iCP) && isNaN(iDP) && isNaN(iTPI)) {
                    validTest = false;
                    errorMessage = "One valid input is required";
                }

                if (isNaN(precision)) {
                    validTest = false;
                    errorMessage = "Number of decimal places must be an integer";
                }

                if (iModule < 0 || iCP < 0 || iDP < 0 || iTPI < 0) {
                    validTest = false;
                    errorMessage = "Input must be a positive value";
                }


                if (validTest) {
                    if (!isNaN(iModule)) {
                        oModule = iModule;
                        oDP = 25.4 / iModule;
                        oCP = Math.PI / oDP;
                        oTPI = 1 / oCP;
                        writeAnswer('Module', 'mm', oModule, oModule, oDP, oCP, oTPI);
                    }
                    if (!isNaN(iCP)) {
                        oCP = iCP;
                        oDP = Math.PI / oCP;
                        oModule = 25.4 / oDP;
                        oTPI = 1 / oCP;
                        writeAnswer('Circular Pitch', 'in', oCP, oModule, oDP, oCP, oTPI);
                    }
                    if (!isNaN(iDP)) {
                        oDP = iDP;
                        oCP = Math.PI / oDP;
                        oModule = 25.4 / oDP;
                        oTPI = 1 / oCP;
                        writeAnswer('Diametral Pitch', '1/in', oDP, oModule, oDP, oCP, oTPI);
                    }
                    if (!isNaN(iTPI)) {
                        oTPI = iTPI;
                        oCP = 1 / iTPI;
                        oDP = Math.PI * oTPI;
                        oModule = 25.4 / oDP;

                        writeAnswer('Threads per Inch', '1/in', oTPI, oModule, oDP, oCP, oTPI);
                    }

                }
                else {
                    document.getElementById('areaResults').value = "Error\n\n" + errorMessage;
                }

            }
            function writeAnswer(inputText, inputUnits, inputValue, oModule, oDP, oCP, oTPI) {
                textToWrite = "Inputs\n" + inputText + ":\t" + inputValue.toFixed(precision) + "\t" + inputUnits + "\n\nOutputs\n" + "Module:\t" + oModule.toFixed(precision) + "\tmm\nDiametral Pitch:\t" + oDP.toFixed(precision) + "\t1/in\nCircular Pitch: \t" + oCP.toFixed(precision) + "\tin" + "\nThreads per Inch: \t" + oTPI.toFixed(precision) + "\t1/in";
                textToWrite = textToWrite + "\n\n" + "\u00A9 " + new Date().getFullYear() + " Evolvent Design,\t" + formatDate(new Date()) + "\nhttps://evolventdesign.com/pages/gear-pitch-calculator";
                document.getElementById('areaResults').value = textToWrite;
            }
        </script>
</body>

</html>
