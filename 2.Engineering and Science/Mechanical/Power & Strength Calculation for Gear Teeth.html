<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bluebox {
            background-color: #f0f0f0;
            padding-top: 10px;
            padding-bottom: 5px;


        }

        .dependentfactor {
            background-color: #e0e0e0;
            padding-top: 10px;
            padding-bottom: 1px;
            margin-bottom: 10px;
        }

        .tooltip {
            position: relative;
            display: inline-block;
            border-bottom: 1px dotted black;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 150px;
            background-color: #f4f5fa;
            color: black;
            text-align: center;
            border-radius: 6px;
            padding: 5px 3px;

            /* Position the tooltip */
            position: absolute;
            z-index: 1;
            top: -5px;
            right: 105%;
        }

        @media (max-width: 720px) {
            .tooltip .tooltiptext {
                width: 150px;
                top: 100%;
                left: 50%;
                margin-left: -75px;
                /* Use half of the width (150/2 = 75), to center the tooltip */
            }
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
        }

        label {
            display: inline-block;
            width: 275px;
            text-align: right;

        }

        @media (max-width:720px) {
            label {
                text-align: left;
            }

            .unitslabel {
                width: 40px;
            }
        }
    </style>
</head>

<body>
    <h1> Calculating Power &amp; Strength of Gears</h1>
    <form>
        <div style="margin-bottom:10px;">
            <label for="input-units" class="unitslabel">Units</label>
            <input type="radio" id="input-units-inch" value="mm" name="units" checked><label for="input-units-inch"
                style="width:120px;padding-left:3px;padding-right:10px;">mm (Module)</label>
            <input type="radio" id="input-units-mm" value="in" name="units"><label for="input-units-mm"
                style="width:200px;padding-left:6px;">1/inch (Diametral Pitch)</label>
        </div>

        <div style="margin-bottom:10px;">
            <label for="input-teeth">Pinion RPM</label>
            <input type="text" id="input-rpm" size="35" placeholder="RPM">
        </div>
        <div style="margin-bottom:10px;">
            <label for="input-teeth">
                <div class="tooltip">Module/DP<span class="tooltiptext">Units are mm for Module, 1/inch for DP</span>
                </div>
            </label>
            <input type="text" id="input-module" size="35" placeholder="Module" onchange="updateDynamic()">
        </div>
        <div class="bluebox">
            <div style="margin-bottom:10px;">
                <label for="input-teeth">Number of Teeth (Pinion)</label>
                <input type="text" id="input-numteeth" size="35" placeholder="Number of Teeth (Pinion)"
                    onchange="updateGeometry();updateDynamic();">
            </div>
            <div style="margin-bottom:10px;">
                <label for="input-teeth">Number of Teeth (Gear)</label>
                <input type="text" id="input-numteethgear" size="35" placeholder="Number of Teeth (Gear)"
                    onchange="updateGeometry()">
            </div>
            <div style="margin-bottom:5px;">
                <label for="pangdrop">Pressure Angle</label>
                <select name="pangdrop" id="pangdrop" onchange="updateGeometry()">
                    <option value="default">Pressure angle...</option>
                    <option value="14.5">14.5 degrees</option>
                    <option value="20">20 degrees</option>

                </select>
            </div>
        </div>
        <div class="dependentfactor">
            <div style="margin-bottom:10px;">
                <label>Geometry Factor</label>
                <input type="text" id="input-I" size="35" placeholder="Depends on gear ratio and pressure angle">
            </div>
        </div>


        <div class="bluebox">
            <div style="margin-bottom:5px;">
                <label for="sacdrop">
                    <div class="tooltip">Material<span class="tooltiptext">BHN is surface hardness</span>
                    </div>
                </label>
                <select name="sacdrop" id="sacdrop" onchange="updateSAC()">
                    <option value="default">Material...</option>
                    <option value="95000">Steel, BHN &gt; 180</option>
                    <option value="115000">Steel, BHN &gt; 240</option>
                    <option value="135000">Steel, BHN &gt; 300</option>
                    <option value="160000">Steel, BHN &gt; 360</option>
                    <option value="190000">Steel, BHN &gt; 440</option>
                    <option value="200000">Steel, Rockwell C 55-63</option>
                    <option value="30000">Cast Iron, grade AGMA 20</option>
                    <option value="50000">Cast Iron, grade AGMA 30</option>
                    <option value="65000">Cast Iron, grade AGMA 40</option>
                    <option value="30000">Bronze, AGMA 2c</option>
                    <option value="65000">Aluminum bronze, heat-treated</option>
                </select>

            </div>
        </div>
        <div class="dependentfactor">
            <div style="margin-bottom:10px;">
                <label>Allowable stress</label>
                <input type="text" id="input-Sac" size="35" placeholder="Depends on material properties">

            </div>
        </div>
        <div class="bluebox">
            <div style="margin-bottom:5px;">
                <label for="dynamicdrop">Manufacturing Method</label>
                <select name="dynamicdrop" id="dynamicdrop" onchange="updateDynamic()">
                    <option value="default">Method...</option>
                    <option value="curve1">High-precision ground or shaved</option>
                    <option value="curve3">Ground or shaved</option>
                    <option value="curve4">Hobbed or shaved</option>
                    <option value="curve5">Milling cutter or other</option>
                </select>

            </div>
        </div>
        <div class="dependentfactor">
            <div style="margin-bottom:10px;">
                <label>Dynamic Factor</label>
                <input type="text" id="input-Cv" size="35" placeholder="Depends on manufacturing method">

            </div>
        </div>

        <div class="bluebox">

            <div style="margin-bottom:10px;">
                <label for="input-face">
                    <div class="tooltip">Face Width<span class="tooltiptext">Use mm for Module, use inch for DP</span>
                    </div>
                </label>
                <input type="text" id="input-face" size="35" placeholder="Face Width (mm)" onchange="updateDist()">
            </div>
            <div style="margin-bottom:5px;">
                <label for="distdrop">Support conditions</label>
                <select name="distdrop" id="distdrop" onchange="updateDist()">
                    <option value="default">Conditions...</option>
                    <option value="rigid">Accurate mountings, low bearing clearances</option>
                    <option value="lessrigid">Less rigid mountings, contact across full face</option>
                    <option value="notfull">Less than full-face contact</option>
                </select>

            </div>
        </div>
        <div class="dependentfactor">
            <div style="margin-bottom:10px;">
                <label>Load-Distribution Factor</label>
                <input type="text" id="input-Cm" size="35" placeholder="Depends on face width &amp; support conditions">
            </div>
        </div>

        <div class="bluebox">
            <div style="margin-bottom:10px;">
                <label for="powersource">Power Source</label>
                <select name="powersource" id="powersource" onchange="updateOverload()">
                    <option value="default">Power Source...</option>
                    <option value="uniform">Uniform</option>
                    <option value="light">Light shock</option>
                    <option value="medium">Medium shock</option>
                </select>

            </div>

            <div style="margin-bottom:5px;">
                <label for="loadshock">Character of Load</label>
                <select name="loadshock" id="loadshock" onchange="updateOverload()">
                    <option value="default">Load...</option>
                    <option value="uniform">Uniform</option>
                    <option value="moderate">Moderate Shock</option>
                    <option value="heavy">Heavy Shock</option>
                </select>
            </div>
        </div>
        <div class="dependentfactor">
            <div style="margin-bottom:10px;">
                <label>Overload Factor</label>
                <input type="text" id="input-Co" size="35" placeholder="Depends on power source and load">

            </div>
        </div>
        <div class="bluebox">
            <div style="margin-bottom:10px;">
                <label for="pmatdrop">Pinion Material</label>
                <select name="pmatdrop" id="pmatdrop" onchange="updateElastic()">
                    <option value="default">Pinion Material...</option>
                    <option value="steel">Steel</option>
                    <option value="castiron">Cast Iron</option>
                    <option value="albronze">Aluminum bronze</option>
                    <option value="snbronze">Tin bronze</option>
                </select>

            </div>
            <div style="margin-bottom:5px;">
                <label for="gmatdrop">Gear Material</label>
                <select name="gmatdrop" id="gmatdrop" onchange="updateElastic()">
                    <option value="default">Gear Material...</option>
                    <option value="steel">Steel</option>
                    <option value="castiron">Cast Iron</option>
                    <option value="albronze">Aluminum bronze</option>
                    <option value="snbronze">Tin bronze</option>
                </select>

            </div>
        </div>
        <div class="dependentfactor">
            <div style="margin-bottom:10px;">
                <label>Elastic Coefficient</label>
                <input type="text" id="input-Cp" size="35" placeholder="Depends on gear &amp; pinion material">

            </div>
        </div>
        <div class="bluebox">
            <div style="margin-bottom:5px;">
                <label for="lifecycles">Total Life Cycles Required</label>
                <select name="lifecycles" id="lifecycles" onchange="updateLife()">
                    <option value="default">Life...</option>
                    <option value="1.5">10,000</option>
                    <option value="1.3">100,000</option>
                    <option value="1.1">1,000,000</option>
                    <option value="1">10,000,000+</option>
                </select>

            </div>
        </div>
        <div class="dependentfactor">
            <div style="margin-bottom:10px;">
                <label>Life Factor</label>
                <input type="text" id="input-CL" size="35" placeholder="Depends on required cycles">
            </div>
        </div>

        <div class="bluebox">
            <div style="margin-bottom:5px;">
                <label for="safetydrop">Application Requirements</label>
                <select name="safetydrop" id="safetydrop" onchange="updateSafety()">
                    <option value="default">Requirements...</option>
                    <option value="1.25">High reliability</option>
                    <option value="1.0">Fewer than 1 failure in 100</option>
                    <option value="0.8">Fewer than 1 failure in 3</option>
                </select>

            </div>
        </div>
        <div class="dependentfactor">
            <div style="margin-bottom:10px;">
                <label>Safety Factor</label>
                <input type="text" id="input-CR" size="35" placeholder="Depends on application requirements">

            </div>
        </div>

        <div style="margin-bottom:10px;">
            <label>
                <div class="tooltip">Size Factor<span class="tooltiptext">Size Factor: use 1.25 for case-carburized
                        gears coarser than 2DP</span>
                </div>
            </label>
            <input type="text" id="input-Cs" size="35" placeholder="1.0">

        </div>

        <div style="margin-bottom:10px;">
            <label>
                <div class="tooltip">Surface-Condition Factor<span class="tooltiptext">Surface-Condition Factor: use
                        1.0</span>
                </div>
            </label>
            <input type="text" id="input-Cf" size="35" placeholder="1.0">

        </div>

        <div style="margin-bottom:10px;">
            <label>
                <div class="tooltip">Hardness Factor<span class="tooltiptext">Hardness Ratio Factor: use 1.0</span>
                </div>
            </label>
            <input type="text" id="input-CH" size="35" placeholder="1.0">

        </div>
        <div style="margin-bottom:10px;">
            <label>
                <div class="tooltip">Temperature Factor<span class="tooltiptext">Temperature Factor: use 1.0 unless
                        temperature exceeds 250°F</span>
                </div>
            </label>
            <input type="text" id="input-CT" size="35" placeholder="1.0">

        </div>





        <div style="margin-bottom:10px;">
            <label for="precision">Number of Decimal Places</label>
            <select name="precision" id="precision">
                <option value="2">2</option>
                <option value="8">8</option>
                <option value="7">7</option>
                <option value="6">6</option>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
                <option value="0">0</option>
            </select>

        </div>

        <div style="margin:auto; width:40%">
            <button text="Calculate" id="button-calculate" onclick="calculate();return false;">Calculate</button>
            <button text="Clear" id="button-clear" onclick="clearInputs();return false;">Clear</button>
            <button text="Copy" id="button-copy" onclick="copyResults();return false;">Copy</button>
        </div>
        <div style="margin:0;width:80%">
            <textarea cols="70" rows="26" id="areaResults"
                style="margin-top:10px; font-family:'Courier New';tab-size:1;"></textarea>
        </div>
    </form>

    <script>
        var radioValue;
        var modWord = "Module";
        var precision;

        var numTeethPinion;
        var numTeethGear;
        var gearModule;
        //var pressureAngle = document.getElementById('input-pangle').value;
        var faceWidthPinion;
        var faceWidthGear;
        var pinionTorque;
        var pinionSpeed;
        var moduleInput;
        var faceWidthPinionInput; // save for output message
        var faceWidthGearInput; // save for output message

        function formatDate(d) {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
            return d.getDate().toString().padStart(2, '0') + "-" + months[d.getMonth()] + "-" + d.getFullYear();
        }
        function logQA(message) {
            //send the message. the message is an object, i.e.:
            //const obj = {name: "John", age: 30, city: "New York"};
            var client = new XMLHttpRequest();
            client.open("POST", "https://oilviscositychart.com/logs/log.php");
            client.setRequestHeader("Content-Type", "application/json");
            client.send(JSON.stringify(message));

        }

        function copyResults() {
            var copyText = document.getElementById('areaResults');
            copyText.select();
            //copyText.setSelectionRange(0, 99999); /*For mobile devices*/
            document.execCommand("copy");
        }

        document.getElementById('button-copy').onclick = function () {
            copyResults();
            return false;
        }

        document.getElementById('button-calculate').onclick = function () {
            calculate();
            return false;
        }

        document.getElementById('button-clear').onclick = function () {
            document.getElementById('input-rpm').value = '';
            document.getElementById('input-module').value = '';
            document.getElementById('input-numteeth').value = '';
            document.getElementById('input-numteethgear').value = '';
            document.getElementById('input-I').value = '';
            document.getElementById('input-Sac').value = '';
            document.getElementById('input-Cv').value = '';
            document.getElementById('input-face').value = '';
            document.getElementById('input-Cm').value = '';
            document.getElementById('input-Co').value = '';
            document.getElementById('input-Cp').value = '';
            document.getElementById('input-CL').value = '';
            document.getElementById('input-CR').value = '';
            document.getElementById('input-Cs').value = '';
            document.getElementById('input-Cf').value = '';
            document.getElementById('input-CH').value = '';
            document.getElementById('input-CT').value = '';

            document.getElementById('pangdrop').value = 'default';
            document.getElementById('sacdrop').value = 'default';
            document.getElementById('dynamicdrop').value = 'default';
            document.getElementById('distdrop').value = 'default';
            document.getElementById('powersource').value = 'default';
            document.getElementById('loadshock').value = 'default';
            document.getElementById('pmatdrop').value = 'default';
            document.getElementById('gmatdrop').value = 'default';
            document.getElementById('lifecycles').value = 'default';
            document.getElementById('safetydrop').value = 'default';


            return false;
        }

        document.getElementsByName('units')[0].onclick = function () {
            radioValue = event.target.value;
            if (radioValue === "in") {
                document.getElementsByName('units')[0].placeholder = "Diametral Pitch";
                document.getElementById('input-face').placeholder = "Face Width (inches)";
                modWord = "Diametral Pitch";
            }
            else {
                document.getElementsByName('units')[0].placeholder = "Module";
                document.getElementById('input-face').placeholder = "Face Width (mm)";
                modWord = "Module";
            }
            updateAll();
        }
        document.getElementsByName('units')[1].onclick = function () {
            radioValue = event.target.value;
            console.log("radio");
            console.log(radioValue);
            if (radioValue === "in") {
                document.getElementById('input-module').placeholder = "Diametral Pitch";
                document.getElementById('input-face').placeholder = "Face Width (inches)";
                modWord = "Diametral Pitch";
            }
            else {
                document.getElementById('input-module').placeholder = "Module";
                document.getElementById('input-face').placeholder = "Face Width (mm)";
                modWord = "Module";
            }
            updateAll();
        }

        function updateAll() {
            updateOverload();
            updateGeometry();
            updateElastic();
            updateSAC();
            updateLife();
            updateSafety();
            updateDynamic();
            updateDist();
            return false;
        }

        function updateOverload() {

            let currentCo = document.getElementById('input-Co').value;
            let currentPower = document.getElementById('powersource').value;
            let currentLoad = document.getElementById('loadshock').value;

            let output = 0;
            switch (currentPower) {
                case "uniform":
                    switch (currentLoad) {
                        case "uniform":
                            output = 1;
                            break;
                        case "moderate":
                            output = 1.25;
                            break;
                        case "heavy":
                            output = 1.75;
                    }
                    break;
                case "light":
                    switch (currentLoad) {
                        case "uniform":
                            output = 1.25;
                            break;
                        case "moderate":
                            output = 1.50;
                            break;
                        case "heavy":
                            output = 2.00;
                    }
                    break;
                case "medium":
                    switch (currentLoad) {
                        case "uniform":
                            output = 1.50;
                            break;
                        case "moderate":
                            output = 1.75;
                            break;
                        case "heavy":
                            output = 2.25;
                    }
            }

            if (output > 0) {
                document.getElementById('input-Co').value = output;
            }

        }


        function updateGeometry() {
            numTeethGear = parseFloat(document.getElementById('input-numteethgear').value);
            numTeethPinion = parseFloat(document.getElementById('input-numteeth').value);
            pangle = parseFloat(document.getElementById('pangdrop').value);

            if (numTeethGear && numTeethPinion && pangle) {
                console.log("Calculate geometry");

                gearRatio = Math.max(numTeethGear, numTeethPinion) / Math.min(numTeethGear, numTeethPinion);
                // Imported the charts from section 13-24 in "Gear Handbook" - Dudley
                // Data is the Geometry Factor, by Gear Ratio in 0.5 increments (depends on pressure angle)
                geom145 = [0.06, 0.07, 0.08, 0.088, 0.09, 0.093, 0.095, 0.097, 0.1, 0.101, 0.102, 0.103, 0.104, 0.105, 0.106, 0.107, 0.108, 0.109, 0.11];
                geom20 = [0.08, 0.1, 0.11, 0.116, 0.12, 0.124, 0.128, 0.132, 0.135, 0.138, 0.139, 0.14, 0.141, 0.142, 0.143, 0.144, 0.145, 0.146, 0.147];

                // Need to find the appropriate index. GR 1.0 = 0, GR 10 = 18
                index = Math.floor(gearRatio * 2 - 2);
                if (index > 18) { index = 18; }

                if (pangle == 14.5) {
                    result = geom145[index];
                }
                else {
                    result = geom20[index];
                }
                console.log("Geometry result: ", result);
                document.getElementById('input-I').value = result;
            }
            else {
                console.log("Do not calculate geometry yet");
            }

        }


        function updateElastic() {
            matPinion = document.getElementById('pmatdrop').value;
            matGear = document.getElementById('gmatdrop').value;
            output = 0;
            if (matPinion == 'default' || matGear == 'default') {
                document.getElementById('input-Cp').value = "Input both gear/pinion material classes";
            }
            else {
                switch (matPinion) {
                    case "steel":
                        switch (matGear) {
                            case "steel":
                                output = 2300
                                break;
                            case "castiron":
                                output = 2000
                                break;
                            case "albronze":
                                output = 1950
                                break;
                            case "snbronze":
                                output = 1900
                        }
                        break;
                    case "castiron":
                        switch (matGear) {
                            case "steel":
                                output = 2000
                                break;
                            case "castiron":
                                output = 1800
                                break;
                            case "albronze":
                                output = 1800
                                break;
                            case "snbronze":
                                output = 1750
                        }
                        break;
                    case "albronze":
                        switch (matGear) {
                            case "steel":
                                output = 1950
                                break;
                            case "castiron":
                                output = 1800
                                break;
                            case "albronze":
                                output = 1750
                                break;
                            case "snbronze":
                                output = 1700
                        }
                        break;
                    case "snbronze":
                        switch (matGear) {
                            case "steel":
                                output = 1900
                                break;
                            case "castiron":
                                output = 1750
                                break;
                            case "albronze":
                                output = 1700
                                break;
                            case "snbronze":
                                output = 1650
                        }
                }
                if (output > 0) {
                    document.getElementById('input-Cp').value = output;
                }

            }

        }


        function updateSAC() {
            getSac = document.getElementById('sacdrop').value;

            if (!(getSac == 'default')) {
                document.getElementById('input-Sac').value = getSac;
            }

        }


        function updateLife() {
            getLife = document.getElementById('lifecycles').value;

            if (!(getLife == 'default')) {
                document.getElementById('input-CL').value = getLife;
            }

        }
        function updateSafety() {
            getSafety = document.getElementById('safetydrop').value;

            if (!(getSafety == 'default')) {
                document.getElementById('input-CR').value = getSafety;
            }

        }


        function updateDynamic() {
            // Update Dynamic Factor

            // Get curve
            curveNum = document.getElementById('dynamicdrop').value;

            gearModule = parseFloat(document.getElementById('input-module').value);
            numTeeth = parseFloat(document.getElementById('input-numteeth').value);

            let output = 0;

            if (radioValue === "in") {
                gearModule = 25.4 / gearModule;
            }

            pitchDiameter = gearModule * numTeeth / 25.4; // inches
            pitchLineVelocity = pitchDiameter * Math.PI / 12; // feet per minute

            switch (curveNum) {
                case "curve1":
                    output = 1;
                    break;
                case "curve3":
                    output = 78 / (78 + Math.sqrt(pitchLineVelocity));
                    break;
                case "curve4":
                    output = 50 / (50 + Math.sqrt(pitchLineVelocity));
                    break;
                case "curve5":
                    output = 0.8 * 50 / (50 + Math.sqrt(pitchLineVelocity));
            }

            if (output > 0) {
                document.getElementById('input-Cv').value = output.toFixed(3);
            }
        }

        function updateDist() {
            // Update Load Distribution Factor
            console.log("Updating Load-Distribution");
            // Get support condition
            supportCond = document.getElementById('distdrop').value;

            Ftemp = parseFloat(document.getElementById('input-face').value);

            let output = 0;

            if (radioValue === "in") {
                Ftemp = Ftemp * 25.4;
            }

            if (isNaN(Ftemp) || Ftemp == undefined || Ftemp == 0) {
                document.getElementById('input-Cm').value = "Face width required";
                return false;
            }
            Ftemp = Ftemp / 25.4; // convert face width to inches

            switch (supportCond) {
                case "rigid":
                    if (Ftemp <= 2) { output = 1.3; }
                    if (Ftemp > 2 && Ftemp <= 6) { output = 1.4; }
                    if (Ftemp > 6 && Ftemp <= 9) { output = 1.5; }
                    if (Ftemp > 9) { output = 1.8; }
                    break;
                case "lessrigid":
                    if (Ftemp <= 2) { output = 1.6; }
                    if (Ftemp > 2 && Ftemp <= 6) { output = 1.7; }
                    if (Ftemp > 6 && Ftemp <= 9) { output = 1.8; }
                    if (Ftemp > 9) { output = 2.2; }
                    break;
                case "notfull":
                    output = 2.2
            }

            if (output > 0) {
                document.getElementById('input-Cm').value = output.toFixed(1);
            }
        }

        function calculate() {

            RPM = parseFloat(document.getElementById('input-rpm').value);
            numTeeth = parseFloat(document.getElementById('input-numteeth').value);
            gearModule = parseFloat(document.getElementById('input-module').value);
            F = parseFloat(document.getElementById('input-face').value);
            Sac = parseFloat(document.getElementById('input-Sac').value);
            //d = parseFloat(document.getElementById('input-d').value);
            I = parseFloat(document.getElementById('input-I').value);

            Cv = parseFloat(document.getElementById('input-Cv').value);
            Cs = parseFloat(document.getElementById('input-Cs').value);
            if (isNaN(Cs)) { Cs = 1; } // Fill in default if not provided 
            Cm = parseFloat(document.getElementById('input-Cm').value);
            Cf = parseFloat(document.getElementById('input-Cf').value);
            if (isNaN(Cf)) { Cf = 1; } // Fill in default if not provided
            Co = parseFloat(document.getElementById('input-Co').value);
            Cp = parseFloat(document.getElementById('input-Cp').value);
            CL = parseFloat(document.getElementById('input-CL').value);
            CH = parseFloat(document.getElementById('input-CH').value);
            if (isNaN(CH)) { CH = 1; } // Fill in default if not provided
            CT = parseFloat(document.getElementById('input-CT').value);
            if (isNaN(CT)) { CT = 1; } // Fill in default if not provided
            CR = parseFloat(document.getElementById('input-CR').value);
            precision = parseFloat(document.getElementById('precision').value);

            moduleInput = gearModule; // save the input value for later
            faceWidthGearInput = F;

            logQA({ 'page': "strength", 'numteeth': numTeeth, 'module': gearModule, 'param5': RPM, 'param6': F, 'param7': modWord })


            var errorMessage = 'Error:\n';
            var okToCalc = true;

            if (isNaN(RPM) || !(RPM > 0)) {
                okToCalc = false
                errorMessage += "Pinion RPM must be greater than 0\n"
            }
            if (isNaN(numTeeth) || !(numTeeth > 0)) {
                okToCalc = false
                errorMessage += "Pinion tooth count must be greater than 0\n"
            }
            if (isNaN(numTeethGear) || !(numTeethGear > 0)) {
                okToCalc = false
                errorMessage += "Gear tooth count must be greater than 0\n"
            }
            if (isNaN(gearModule) || !(gearModule > 0)) {
                okToCalc = false
                errorMessage += "Module/DP must be greater than 0\n"
            }
            if (isNaN(F) || !(F > 0)) {
                okToCalc = false
                errorMessage += "Face width must be greater than 0\n"
            }
            if (isNaN(Sac) || !(Sac > 0)) {
                okToCalc = false
                errorMessage += "Allowable stress must be greater than 0\n"
            }
            if (isNaN(I) || !(I > 0)) {
                okToCalc = false
                errorMessage += "Geometry factor must be greater than 0\n"
            }
            if (isNaN(Cv) || !(Cv > 0)) {
                okToCalc = false
                errorMessage += "Dynamic factor must be greater than 0\n"
            }
            if (isNaN(Cs) || !(Cs > 0)) {
                okToCalc = false
                errorMessage += "Size factor must be greater than 0\n"
            }
            if (isNaN(Cm) || !(Cm > 0)) {
                okToCalc = false
                errorMessage += "Load-distribution factor must be greater than 0\n"
            }
            if (isNaN(Cf) || !(Cf > 0)) {
                okToCalc = false
                errorMessage += "Surface-condition factor must be greater than 0\n"
            }
            if (isNaN(Co) || !(Co > 0)) {
                okToCalc = false
                errorMessage += "Overload factor must be greater than 0\n"
            }
            if (isNaN(Cp) || !(Cp > 0)) {
                okToCalc = false
                errorMessage += "Elastic coefficient must be greater than 0\n"
            }
            if (isNaN(CL) || !(CL > 0)) {
                okToCalc = false
                errorMessage += "Life factor must be greater than 0\n"
            }
            if (isNaN(CH) || !(CH > 0)) {
                okToCalc = false
                errorMessage += "Hardness factor must be greater than 0\n"
            }
            if (isNaN(CT) || !(CT > 0)) {
                okToCalc = false
                errorMessage += "Temperature factor must be greater than 0\n"
            }
            if (isNaN(CR) || !(CR > 0)) {
                okToCalc = false
                errorMessage += "Safety factor must be greater than 0\n"
            }
            if (isNaN(precision) || !(precision >= 0)) {
                okToCalc = false
                errorMessage += "Precision must be 0 or greater\n"
            }




            if (okToCalc) {
                calculateMOW()
            }
            else {
                document.getElementById('areaResults').value = errorMessage;
            }

            return false;
        }
        function calculateMOW() {
            // Based on "Gear Handbook" - Dudley, Section 13-1

            // get all units in metric (mm,module)

            let unitWord = "mm";
            let moduleWord = "Module";

            if (radioValue === "in") {
                gearModule = 25.4 / gearModule;
                F = F * 25.4;
                unitWord = "in";
                moduleWord = "Diametral Pitch";
            }

            F = F / 25.4; //inches
            pitchDiameter = gearModule * numTeeth / 25.4; // inches
            pitchLineVelocity = pitchDiameter * Math.PI / 12; // feet per minute





            let outputPower = RPM * F / 126000 * I * Cv / Cs / Cm / Cf / Co * (Sac * pitchDiameter * CL * CH / Cp / CT / CR) ** 2;
            /*
            console.log("RPM ",RPM);
            console.log("F ",F);
            console.log("I ",I);
            console.log("Cv ",Cv);
            console.log("Cs ",Cs);
            console.log("Cm ",Cm);
            console.log("Cf ",Cf);
            console.log("Co ",Co);
            console.log("Sac ",Sac);
            console.log("pitchDiameter ",pitchDiameter);
            console.log("CL ",CL);
            console.log("CH ",CH);
            console.log("Cp ",Cp);
            console.log("CT ",CT);
            console.log("CR ",CR);
            */
            textToWrite = "Inputs";
            textToWrite += "\nPinion RPM:\t" + RPM;
            textToWrite += "\nNumber of Teeth (Pinion):\t" + numTeeth;
            textToWrite += "\nNumber of Teeth (Gear):\t" + numTeethGear;
            textToWrite += "\n" + moduleWord + ":\t" + moduleInput;
            textToWrite += "\nFace Width:\t" + faceWidthGearInput + "\t" + unitWord;
            textToWrite += "\nAllowable Stress:\t" + Sac;
            textToWrite += "\nGeometry Factor:\t" + I;
            textToWrite += "\nDynamic Factor:\t" + Cv;
            textToWrite += "\nSize Factor:\t" + Cs;
            textToWrite += "\nLoad-Distribution Factor:\t" + Cm;
            textToWrite += "\nSurface-Condition Factor:\t" + Cf;
            textToWrite += "\nOverload Factor:\t" + Co;
            textToWrite += "\nElastic Coefficient:\t" + Cp;
            textToWrite += "\nLife Factor:\t" + CL;
            textToWrite += "\nHardness Factor:\t" + CH;
            textToWrite += "\nTemperature Factor:\t" + CT;
            textToWrite += "\nSafety Factor:\t" + CR;
            textToWrite += "\n\nOutputs";
            textToWrite += "\nHorsepower:\t" + outputPower.toFixed(precision) + "\thp";
            textToWrite += "\nPitch Diameter:\t" + pitchDiameter.toFixed(precision) + "\tin";
            textToWrite += "\nPitch Line Velocity:\t" + pitchLineVelocity.toFixed(precision) + "\tfpm";
            textToWrite += "\n\n\u00A9 " + new Date().getFullYear() + " Evolvent Design," + "\t" + formatDate(new Date()) + "\nhttps://evolventdesign.com/pages/gear-strength-calculator";

            document.getElementById('areaResults').value = textToWrite;

            return false;
        }
