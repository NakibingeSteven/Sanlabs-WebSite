<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .tooltip {
            position: relative;
            display: inline-block;
            border-bottom: 1px dotted black;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 150px;
            background-color: #f4f5fa;
            color: black;
            text-align: center;
            border-radius: 6px;
            padding: 5px 3px;

            /* Position the tooltip */
            position: absolute;
            z-index: 1;
            top: -5px;
            right: 105%;
        }

        @media (max-width: 720px) {
            .tooltip .tooltiptext {
                width: 150px;
                top: 100%;
                left: 50%;
                margin-left: -75px;
                /* Use half of the width (150/2 = 75), to center the tooltip */
            }
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
        }

        label {
            display: inline-block;
            width: 275px;
            text-align: right;

        }

        @media (max-width:720px) {
            label {
                text-align: left;
            }

            .unitslabel {
                width: 40px;
            }
        }
    </style>
</head>

<body>
    <form>
        <div style="margin-bottom:10px;">
            <label for="input-units" class="unitslabel">Units</label>
            <input type="radio" id="input-units-inch" value="mm" name="units" checked><label for="mm"
                style="width:120px;padding-left:3px;padding-right:10px;">mm (Module)</label>
            <input type="radio" id="input-units-mm" value="in" name="units"><label for="in"
                style="width:200px;padding-left:6px;">1/inch (Diametral Pitch)</label>
        </div>
        <div style="margin-bottom:10px;">
            <label for="input-teeth">Number of Teeth (Gear 1)*</label>
            <input type="text" id="input-teeth" size="35" placeholder="Number of Teeth (Gear 1)">
        </div>
        <div style="margin-bottom:10px;">
            <label for="input-teeth">Number of Teeth (Gear 2)*</label>
            <input type="text" id="input-teeth2" size="35" placeholder="Number of Teeth (Gear 2)">
        </div>
        <div style="margin-bottom:10px;">
            <label>
                <div class="tooltip">DP/Module*<span class="tooltiptext">Module is in millimeters, DP is in
                        1/inch</span>
                </div>
            </label>
            <input type="text" id="input-module" size="35" placeholder="Module">

        </div>
        <div style="margin-bottom:10px;">
            <label>
                <div class="tooltip">Pressure Angle*<span class="tooltiptext">Common values: 20, 14.5, 25</span>
                </div>
            </label>
            <input type="text" id="input-pangle" size="35" placeholder="Pressure Angle (degrees)">

        </div>
        <div style="margin-bottom:10px;">
            <label for="precision">Number of Decimal Places</label>
            <select name="precision" id="precision">
                <option value="4">4</option>
                <option value="8">8</option>
                <option value="7">7</option>
                <option value="6">6</option>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
                <option value="0">0</option>
            </select>

        </div>

        <div style="margin:auto; width:40%">
            <button text="Calculate" id="button-calculate" onclick="calculate();return false;">Calculate</button>
            <button text="Clear" id="button-clear" onclick="clearInputs();return false;">Clear</button>
            <button text="Copy" id="button-copy" onclick="copyResults();return false;">Copy</button>
        </div>
        <div style="margin:0;width:80%">
            <textarea cols="70" rows="11" id="areaResults"
                style="margin-top:10px; font-family:'Courier New';tab-size:1;"></textarea>
        </div>
    </form>

    <script>
        var radioValue;
        var unitWord;
        function formatDate(d) {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
            return d.getDate().toString().padStart(2, '0') + "-" + months[d.getMonth()] + "-" + d.getFullYear();
        }
        function logQA(message) {
            //send the message. the message is an object, i.e.:
            //const obj = {name: "John", age: 30, city: "New York"};
            var client = new XMLHttpRequest();
            client.open("POST", "https://oilviscositychart.com/logs/log.php");
            client.setRequestHeader("Content-Type", "application/json");
            client.send(JSON.stringify(message));

        }

        function copyResults() {
            var copyText = document.getElementById('areaResults');
            copyText.select();
            //copyText.setSelectionRange(0, 99999); /*For mobile devices*/
            document.execCommand("copy");
        }

        document.getElementById('button-copy').onclick = function () {
            copyResults();
            return false;
        }

        document.getElementById('button-calculate').onclick = function () {
            calculate();
            return false;
        }

        document.getElementById('button-clear').onclick = function () {
            document.getElementById('input-teeth').value = '';
            document.getElementById('input-teeth2').value = '';
            document.getElementById('input-module').value = '';
            document.getElementById('input-pangle').value = '';
            return false;
        }


        document.getElementsByName('units')[0].onclick = function () {
            radioValue = event.target.value;
            console.log("radio");
            console.log(radioValue);
            if (radioValue === "in") {
                document.getElementsByName('units')[0].placeholder = "Diametral Pitch";
            }
            else {
                //document.getElementById('#module').innerHTML = "Module";
                document.getElementsByName('units')[0].placeholder = "Module";
            }
        }
        document.getElementsByName('units')[1].onclick = function () {
            radioValue = event.target.value;
            console.log("radio");
            console.log(radioValue);
            if (radioValue === "in") {
                //document.getElementById('#module').innerHTML = "Diametral Pitch";
                document.getElementsByName('units')[0].placeholder = "Diametral Pitch";
            }
            else {
                //document.getElementById('#module').innerHTML = "Module";
                document.getElementsByName('units')[0].placeholder = "Module";
            }
        }

        var z;
        var m_n;
        var alpha_n_Degree;
        var alpha_n; //= parseFloat(alpha_n_Degree)*Math.PI/180;
        var precision;

        function calculate() {

            var numTeeth1 = parseFloat(document.getElementById('input-teeth').value);
            var numTeeth2 = parseFloat(document.getElementById('input-teeth2').value);
            var module = document.getElementById('input-module').value;
            var pressureAngle = document.getElementById('input-pangle').value;
            var precision = document.getElementById('precision').value;

            //  console.log(numTeeth);
            //  console.log(module);
            //  console.log(pressureAngle);

            logQA({ 'page': "centerDistance", 'numteeth': numTeeth1, 'module': module, 'pangle': pressureAngle, 'param5': numTeeth2, 'param6': radioValue })
            var errorMessage = "Error";
            var okToCalc = true;
            if (!(numTeeth1 >= 8 && numTeeth1 <= 368)) {
                okToCalc = false;
                errorMessage = errorMessage + "\n" + "Number of teeth on Gear 1 must be between 8 and 368"
            }
            if (!(numTeeth2 >= 8 && numTeeth2 <= 368)) {
                okToCalc = false;
                errorMessage = errorMessage + "\n" + "Number of teeth on Gear 2  must be between 8 and 368"
            }
            if (!(Number.isInteger(numTeeth1))) {
                okToCalc = false;
                errorMessage = "Number of teeth on Gear 1 must be an integer";
            }
            if (!(Number.isInteger(numTeeth2))) {
                okToCalc = false;
                errorMessage = "Number of teeth on Gear 2 must be an integer";
            }
            if (!(module >= 0.1 && module <= 256)) {
                okToCalc = false;
                errorMessage = errorMessage + "\n" + "Module/DP must be between 0.1 and 256"
            }
            if (!(pressureAngle >= 1 && pressureAngle <= 45)) {
                okToCalc = false;
                errorMessage = errorMessage + "\n" + "Pressure Angle must be between 1 and 45 degrees"
            }
            if (!(precision >= 0 && precision <= 8)) {
                okToCalc = false;
                errorMessage = errorMessage + "\n" + "Number of Decimal Places must be between 0 and 8"
            }

            if (okToCalc) {
                calculateMOW()
            }
            else {
                document.getElementById('areaResults').value = errorMessage;
                //document.getElementById("#text10").innerHTML = errorMessage;
            }



        }
        function calculateMOW() {

            z1 = parseFloat(document.getElementById('input-teeth').value);
            z2 = parseFloat(document.getElementById('input-teeth2').value);
            m_n = parseFloat(document.getElementById('input-module').value);
            alpha_n_Degree = parseFloat(document.getElementById('input-pangle').value);
            alpha_n = parseFloat(alpha_n_Degree) * Math.PI / 180;
            precision = document.getElementById('precision').value;
            var m_nInput = m_n;
            var placeWord;
            var unitConversion;
            if (radioValue === "in") {
                m_n = 25.4 / m_n;
                unitWord = "inches"
                modWord = "Diametral Pitch";
                unitConversion = 1;
            }
            else {
                unitWord = "millimeters"
                modWord = "Module";
                unitConversion = 25.4;
            }

            if (precision == 1) {
                placeWord = "place";
            }
            else {
                placeWord = "places";
            }

            ///BASIC GEAR DIMENSIONS

            pitchDiameter1 = m_n * z1 * unitConversion / 25.4;
            pitchDiameter2 = m_n * z2 * unitConversion / 25.4;
            //baseCircle = pitchDiameter * Math.cos(alpha_n);
            centerDistance = (pitchDiameter1 + pitchDiameter2) / 2;

            diametralPitch = 25.4 / m_n;
            //outerDiameter = (z+2)*m_n*unitConversion/25.4; // (full depth teeth)  


            //addendum = 1/diametralPitch*unitConversion;
            //dedendum = 1.250/diametralPitch*unitConversion;
            //workingDepth = 2/diametralPitch*unitConversion;
            //wholeDepth = 2.25 / diametralPitch*unitConversion; //(preferred)
            //rootDiameter = (z-2.5)/diametralPitch*unitConversion; // (preferred)


            if (radioValue == "in") {
                // reset units to millimeters (to display both)
                pitchDiameter1 = pitchDiameter1 * 25.4;
                pitchDiameter2 = pitchDiameter2 * 25.4;
                centerDistance = centerDistance * 25.4;
            }

            textToWrite = "Inputs" + "\n" + modWord + ":\t" + m_nInput + "\nPressure Angle:\t" + alpha_n_Degree + "\tdegrees" + "\nNumber of Teeth (Gear 1):\t" + z1 + "\nNumber of Teeth (Gear 2):\t" + z2 + "\n\nOutputs" + "\nCenter Distance:\t" + centerDistance.toFixed(precision) + "\tmm\t" + (centerDistance / 25.4).toFixed(precision) + "\tin" + "\n\n\u00A9 " + new Date().getFullYear() + " Evolvent Design," + "\t" + formatDate(new Date()) + "\nhttps://evolventdesign.com/pages/center-distance-calc";;

            // OLD Output
            //  "+ "\nPitch Diameter:\t" + pitchDiameter.toFixed(precision) + "\tmm\t" + (pitchDiameter/25.4).toFixed(precision) + "\tin"+ "\nBase Diameter: \t" + baseCircle.toFixed(precision) + "\tmm\t" + (baseCircle/25.4).toFixed(precision) +"\tin"+ "\nRoot Diameter: \t" + rootDiameter.toFixed(precision) + "\tmm\t" + (rootDiameter/25.4).toFixed(precision) +"\tin" +"\n\nAddendum:       \t" + addendum.toFixed(precision) + "\tmm\t" + (addendum/25.4).toFixed(precision) +"\tin"+ "\nDedendum:       \t" + dedendum.toFixed(precision) + "\tmm\t" + (dedendum/25.4).toFixed(precision) +"\tin"+ "\nWorking Depth:  \t" + workingDepth.toFixed(precision) + "\tmm\t" + (workingDepth/25.4).toFixed(precision) +"\tin"+ "\nWhole Depth:    \t" + wholeDepth.toFixed(precision) + "\tmm\t" + (wholeDepth/25.4).toFixed(precision) +"\tin"


            document.getElementById('areaResults').value = textToWrite;
        }
    </script>
</body>

</html>
