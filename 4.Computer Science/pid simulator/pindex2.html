<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PID Controller Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensure full viewport height */
        }
        
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 800px;
            overflow: hidden; /* Hide any potential overflow */
        }
        
        h1 {
            text-align: center;
            color: #333;
        }
        
        .input-section {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .input-section > div {
            flex: 1 1 200px; /* Each input section takes equal width */
            display: flex;
            align-items: center;
        }
        
        .input-section label {
            flex: 0 0 140px; /* Fixed width for labels */
            font-weight: bold;
            margin-right: 10px;
        }
        
        .input-section input[type="number"] {
            flex: 1; /* Input fields take remaining space */
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        .input-section button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            flex: 0 0 auto; /* Button takes its natural size */
        }
        
        .input-section button:hover {
            background-color: #45a049;
        }
        
        #output {
            margin-top: 20px;
            max-height: calc(100vh - 200px); /* Adjust according to your layout */
            overflow: auto; /* Enable vertical scroll if necessary */
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table th, table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        
        table th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PID Controller Simulation</h1>
        <div class="input-section">
            <div>
                <label for="kp">Proportional Gain (Kp):</label>
                <input type="number" id="kp" step="0.01" value="0.1">
            </div>
            <div>
                <label for="ki">Integral Gain (Ki):</label>
                <input type="number" id="ki" step="0.01" value="0.01">
            </div>
            <div>
                <label for="kd">Derivative Gain (Kd):</label>
                <input type="number" id="kd" step="0.01" value="0.05">
            </div>
            <div>
                <label for="rows">Number of Rows:</label>
                <input type="number" id="rows" value="10">
            </div>
            <div>
                <button onclick="calculatePID()">Run</button>
            </div>
        </div>
        <div id="output">
            <!-- Table will be dynamically generated here -->
        </div>
    </div>
    
    <script>
        function calculatePID() {
            var kp = parseFloat(document.getElementById('kp').value);
            var ki = parseFloat(document.getElementById('ki').value);
            var kd = parseFloat(document.getElementById('kd').value);
            var numRows = parseInt(document.getElementById('rows').value);
        
            var previousMotorSpeed = 0;
            var tableHTML = '<table><thead><tr><th>Time (s)</th><th>Target Speed (100 RPM)</th><th>Previous Motor Speed</th><th>Error (100 - Previous Motor Speed)</th><th>Proportional Output (P)</th><th>Accumulated Error (Integral, I)</th><th>Integral Output (I)</th><th>Rate of Change of Error (Derivative, D)</th><th>Derivative Output (D)</th><th>Total PID Output</th><th>Motor Response</th><th>Current Motor Speed</th></tr></thead><tbody>';
        
            for (var i = 0; i < numRows; i++) {
                var error = 100 - previousMotorSpeed;
        
                var proportionalOutput = kp * error;
                var integralOutput = ki * error;
                var derivativeOutput = kd * (previousMotorSpeed - 100);
                var totalPIDOutput = proportionalOutput + integralOutput + derivativeOutput;
        
                var currentMotorSpeed = previousMotorSpeed + totalPIDOutput;
        
                var motorResponse;
                if (totalPIDOutput > 0) {
                    motorResponse = 'Increase power to correct error.';
                } else if (totalPIDOutput < 0) {
                    motorResponse = 'Decrease power to correct error.';
                } else {
                    motorResponse = 'Motor speed matches target.';
                }
        
                tableHTML += `<tr><td>${i}</td><td>100</td><td>${previousMotorSpeed.toFixed(2)}</td><td>${error.toFixed(2)}</td><td>${proportionalOutput.toFixed(2)}</td><td>${integralOutput.toFixed(2)}</td><td>${integralOutput.toFixed(2)}</td><td>${derivativeOutput.toFixed(2)}</td><td>${derivativeOutput.toFixed(2)}</td><td>${totalPIDOutput.toFixed(2)}</td><td>${motorResponse}</td><td>${currentMotorSpeed.toFixed(2)}</td></tr>`;
        
                previousMotorSpeed = currentMotorSpeed;
            }
        
            tableHTML += '</tbody></table>';
        
            document.getElementById('output').innerHTML = tableHTML;
        }
    </script>
</body>
</html>
