<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PID Controller Simulation</title>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    table, th, td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
    }
    th {
        background-color: #f2f2f2;
    }
</style>
</head>
<body>
    <h2>PID Controller Simulation</h2>
    <div>
        <label for="expected-speed">Expected Speed (RPM):</label>
        <input type="number" id="expected-speed" value="100">
        <br><br>
        <label for="starting-speed">Starting Speed (RPM):</label>
        <input type="number" id="starting-speed" value="80">
        <br><br>
        <label for="kp">Kp:</label>
        <input type="number" id="kp" step="0.01" value="0.2">
        <br><br>
        <label for="ki">Ki:</label>
        <input type="number" id="ki" step="0.01" value="0.1">
        <br><br>
        <label for="kd">Kd:</label>
        <input type="number" id="kd" step="0.01" value="0.05">
        <br><br>
        <button onclick="startSimulation()">Start Simulation</button>
    </div>
    <table id="results-table">
        <thead>
            <tr>
                <th>Time (s)</th>
                <th>Expected Speed (RPM)</th>
                <th>Current Speed (RPM)</th>
                <th>Error (RPM)</th>
                <th>Proportional (P)</th>
                <th>Accumulated Error (I)</th>
                <th>Integral (I)</th>
                <th>Rate of Change (D)</th>
                <th>Derivative (D)</th>
                <th>Total PID Output</th>
                <th>Motor Response</th>
                <th>New Motor Speed (RPM)</th>
            </tr>
        </thead>
        <tbody id="results-body">
            <!-- Results will be dynamically inserted here -->
        </tbody>
    </table>

<script>
function startSimulation() {
    let expectedSpeed = parseFloat(document.getElementById('expected-speed').value);
    let currentSpeed = parseFloat(document.getElementById('starting-speed').value);
    let kp = parseFloat(document.getElementById('kp').value);
    let ki = parseFloat(document.getElementById('ki').value);
    let kd = parseFloat(document.getElementById('kd').value);
    let time = 0;
    let accumulatedError = 0;
    let resultsTableBody = document.getElementById('results-body');
    
    resultsTableBody.innerHTML = ''; // Clear previous results

    while (time <= 10) { // Simulate for 10 seconds as an example
        let error = expectedSpeed - currentSpeed;
        let proportional = kp * error;
        accumulatedError += error;
        let integral = ki * accumulatedError;
        let rateOfChange = error - lastError || 0;
        let derivative = kd * rateOfChange;
        let totalPIDOutput = proportional + integral + derivative;
        
        // Update current speed based on PID output
        currentSpeed += totalPIDOutput;

        // Prepare row for results table
        let newRow = `
            <tr>
                <td>${time}</td>
                <td>${expectedSpeed}</td>
                <td>${currentSpeed.toFixed(2)}</td>
                <td>${error.toFixed(2)}</td>
                <td>${proportional.toFixed(2)}</td>
                <td>${accumulatedError.toFixed(2)}</td>
                <td>${integral.toFixed(2)}</td>
                <td>${rateOfChange.toFixed(2)}</td>
                <td>${derivative.toFixed(2)}</td>
                <td>${totalPIDOutput.toFixed(2)}</td>
                <td>${getMotorResponse(error)}</td>
                <td>${(currentSpeed + totalPIDOutput).toFixed(2)}</td>
            </tr>
        `;
        
        // Append row to results table
        resultsTableBody.insertAdjacentHTML('beforeend', newRow);
        
        // Update lastError for next iteration
        lastError = error;
        
        // Exit loop if speed stabilizes (in a real application, this would be based on tolerance or actual stabilization criteria)
        if (Math.abs(error) < 0.1) {
            break;
        }

        // Increment time for the next iteration
        time++;
    }
}

function getMotorResponse(error) {
    if (error > 0) {
        return "Increase power to correct error";
    } else if (error < 0) {
        return "Decrease power to correct error";
    } else {
        return "Speed is stable";
    }
}
</script>
</body>
</html>
