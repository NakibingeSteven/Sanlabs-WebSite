<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PID Controller Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-section label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-section input[type="number"] {
            width: 100px;
            padding: 8px;
            margin-right: 10px;
        }

        .input-section button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .input-section button:hover {
            background-color: #45a049;
        }

        #output {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>PID Controller Simulation</h1>
        <div class="input-section">
            <label for="kp">Proportional Gain (Kp):</label>
            <input type="number" id="kp" step="0.01" value="0.1">
            <label for="ki">Integral Gain (Ki):</label>
            <input type="number" id="ki" step="0.01" value="0.01">
            <label for="kd">Derivative Gain (Kd):</label>
            <input type="number" id="kd" step="0.01" value="0.05">
            <label for="rows">Number of Rows:</label>
            <input type="number" id="rows" value="10">
            <button onclick="calculatePID()">Calculate</button>
        </div>
        <div id="output">
            <!-- Table will be dynamically generated here -->
        </div>
    </div>
    <script>
        function calculatePID() {
            // Get PID constants and number of rows from input fields
            var kp = parseFloat(document.getElementById('kp').value);
            var ki = parseFloat(document.getElementById('ki').value);
            var kd = parseFloat(document.getElementById('kd').value);
            var numRows = parseInt(document.getElementById('rows').value);

            // Initialize variables
            var previousMotorSpeed = 0; // Initial condition
            var tableHTML = '<table><tr><th>Time (s)</th><th>Target Speed (100 RPM)</th><th>Previous Motor Speed</th><th>Error (100 - Previous Motor Speed)</th><th>Proportional Output (P)</th><th>Accumulated Error (Integral, I)</th><th>Integral Output (I)</th><th>Rate of Change of Error (Derivative, D)</th><th>Derivative Output (D)</th><th>Total PID Output</th><th>Motor Response</th><th>Current Motor Speed</th></tr>';

            // Loop to calculate each row of the table
            for (var i = 0; i < numRows; i++) {
                // Calculate error
                var error = 100 - previousMotorSpeed;

                // Calculate PID components
                var proportionalOutput = kp * error;
                var integralOutput = ki * error;
                var derivativeOutput = kd * (previousMotorSpeed - 100); // Assuming a time step of 1s
                var totalPIDOutput = proportionalOutput + integralOutput + derivativeOutput;

                // Calculate new motor speed
                var currentMotorSpeed = previousMotorSpeed + totalPIDOutput;

                // Determine motor response
                var motorResponse;
                if (totalPIDOutput > 0) {
                    motorResponse = 'Increase power to correct error.';
                } else if (totalPIDOutput < 0) {
                    motorResponse = 'Decrease power to correct error.';
                } else {
                    motorResponse = 'Motor speed matches target.';
                }

                // Append row to table HTML
                tableHTML += `<tr><td>${i}</td><td>100</td><td>${previousMotorSpeed.toFixed(2)}</td><td>${error.toFixed(2)}</td><td>${proportionalOutput.toFixed(2)}</td><td>${integralOutput.toFixed(2)}</td><td>${integralOutput.toFixed(2)}</td><td>${derivativeOutput.toFixed(2)}</td><td>${derivativeOutput.toFixed(2)}</td><td>${totalPIDOutput.toFixed(2)}</td><td>${motorResponse}</td><td>${currentMotorSpeed.toFixed(2)}</td></tr>`;

                // Update previous motor speed for next iteration
                previousMotorSpeed = currentMotorSpeed;
            }

            // Close table
            tableHTML += '</table>';

            // Display table in output div
            document.getElementById('output').innerHTML = tableHTML;
        }

    </script>
</body>

</html>
