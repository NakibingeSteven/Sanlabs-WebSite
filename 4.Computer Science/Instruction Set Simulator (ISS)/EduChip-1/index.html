<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processor Simulator</title>
  <style>
    /* CSS styles for visual representation */
    .register {
      border: 1px solid black;
      padding: 5px;
      margin: 5px;
      display: inline-block;
    }
    #memory {
      margin-top: 10px;
    }
    .memory-cell {
      border: 1px solid #ccc;
      width: 50px;
      height: 50px;
      display: inline-block;
      text-align: center;
      line-height: 50px;
      margin: 5px;
    }
    #flags {
      margin-top: 10px;
    }
    .flag {
      border: 1px solid black;
      padding: 5px;
      margin: 5px;
      display: inline-block;
    }
    #instructionEditor {
      width: 80%;
      height: 200px;
      margin-top: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="registers">
    <div class="register" id="regA">A: 0</div>
    <div class="register" id="regB">B: 0</div>
    <!-- Add more registers as needed -->
  </div>

  <div id="memory">
    <!-- Memory cells visualization will be populated dynamically -->
  </div>

  <div id="flags">
    <!-- Flags or condition codes display -->
  </div>

  <textarea id="instructionEditor" rows="10" cols="50">
    ; Type your assembly instructions here
    MOV A, 5
    ADD A, B
    ; Example instructions
  </textarea>

  <button onclick="runSimulation()">Run</button>
  <button onclick="stepSimulation()">Step</button>
  <button onclick="resetSimulation()">Reset</button>

  <script>
    // JavaScript code for simulation logic
    const registers = {
      A: 0,
      B: 0
      // Add more registers as needed
    };

    const memory = new Array(16).fill(0); // 16 memory cells for simplicity

    const flags = {
      Z: false, // Zero flag
      C: false // Carry flag
      // Add more flags as needed
    };

    // Initialize UI with initial register values
    document.getElementById('regA').textContent = `A: ${registers.A}`;
    document.getElementById('regB').textContent = `B: ${registers.B}`;

    // Function to update register display
    function updateRegistersDisplay() {
      document.getElementById('regA').textContent = `A: ${registers.A}`;
      document.getElementById('regB').textContent = `B: ${registers.B}`;
      // Update other registers as needed
    }

    // Function to update memory display
    function updateMemoryDisplay() {
      const memoryDisplay = document.getElementById('memory');
      memoryDisplay.innerHTML = '';
      memory.forEach((value, index) => {
        const cell = document.createElement('div');
        cell.classList.add('memory-cell');
        cell.textContent = `${index}: ${value}`;
        memoryDisplay.appendChild(cell);
      });
    }

    // Function to update flags display
    function updateFlagsDisplay() {
      const flagsDisplay = document.getElementById('flags');
      flagsDisplay.innerHTML = '';
      for (const flag in flags) {
        const flagDiv = document.createElement('div');
        flagDiv.classList.add('flag');
        flagDiv.textContent = `${flag}: ${flags[flag]}`;
        flagsDisplay.appendChild(flagDiv);
      }
    }

    // Function to execute a single instruction
    function executeInstruction(instruction) {
      // Implement execution logic based on the instruction set
      // For simplicity, a basic implementation is shown below
      const parts = instruction.trim().split(' ');
      const op = parts[0];
      const operand1 = parts[1];
      const operand2 = parts[2];

      switch (op) {
        case 'MOV':
          if (operand1 === 'A' && !isNaN(operand2)) {
            registers.A = parseInt(operand2);
          } else if (operand1 === 'B' && !isNaN(operand2)) {
            registers.B = parseInt(operand2);
          }
          break;
        case 'ADD':
          if (operand1 === 'A' && operand2 === 'B') {
            registers.A += registers.B;
          }
          break;
        // Add more cases for other instructions (SUB, AND, OR, etc.)
        default:
          console.log('Invalid instruction');
          break;
      }

      // Update UI after execution
      updateRegistersDisplay();
      updateMemoryDisplay();
      updateFlagsDisplay();
    }

    // Function to run the simulation
    function runSimulation() {
      const instructions = document.getElementById('instructionEditor').value.split('\n');
      instructions.forEach(instruction => {
        executeInstruction(instruction);
      });
    }

    // Function to simulate a single step execution
    function stepSimulation() {
      const instructions = document.getElementById('instructionEditor').value.split('\n');
      const currentInstruction = instructions.shift(); // Get the first instruction
      if (currentInstruction) {
        executeInstruction(currentInstruction);
        // Update instruction editor to show remaining instructions
        document.getElementById('instructionEditor').value = instructions.join('\n');
      }
    }

    // Function to reset simulation state
    function resetSimulation() {
      registers.A = 0;
      registers.B = 0;
      // Reset memory, flags, and other components as needed
      updateRegistersDisplay();
      updateMemoryDisplay();
      updateFlagsDisplay();
    }
  </script>
</body>
</html>
