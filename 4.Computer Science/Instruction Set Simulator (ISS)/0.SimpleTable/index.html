
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Instruction Set Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        #app {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 8px;
            box-sizing: border-box;
            margin-top: 10px;
            resize: vertical;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .instruction-table td {
            cursor: help;
            position: relative;
        }
        .instruction-table td:hover::after {
            content: attr(data-instruction);
            position: absolute;
            background-color: yellow;
            white-space: nowrap;
            padding: 5px;
            border: 1px solid black;
            border-radius: 5px;
            left: 50%;
            transform: translateX(-50%);
            top: -30px;
        }
    </style>
</head>

<body>

    <div id="app">
        <h1>Table Instruction Set Simulator</h1>
        <h2>Memory</h2>
        <div id="tableContainer"></div>
         
        <h2>Instrcution Set</h2>
        <div id="instructionTableContainer"></div>

        <h2>GPIOS</h2>
        <div id="gpioTableContainer"></div>

        <textarea id="commandInput" placeholder="Enter commands here..."></textarea>
        <button id="executeButton">Execute Commands</button>
    </div>

    <script>
        const instructionSet = [
            { name: 'SET', func: (args) => setCellValue(parseInt(args[0]), parseInt(args[1])) },
            { name: 'GET', func: (args) => getCellValue(parseInt(args[0])) },
            { name: 'CLEAR', func: (args) => clearCellValue(parseInt(args[0])) },
            { name: 'INCREMENT', func: (args) => incrementCellValue(parseInt(args[0])) },
            { name: 'DECREMENT', func: (args) => decrementCellValue(parseInt(args[0])) },
            { name: 'SWAP', func: (args) => swapCells(parseInt(args[0]), parseInt(args[1])) },
            { name: 'ADD', func: (args) => addCellValue(parseInt(args[0]), parseInt(args[1])) },
            { name: 'SUBTRACT', func: (args) => subtractCellValue(parseInt(args[0]), parseInt(args[1])) },
            { name: 'MULTIPLY', func: (args) => multiplyCellValue(parseInt(args[0]), parseInt(args[1])) },
            { name: 'DIVIDE', func: (args) => divideCellValue(parseInt(args[0]), parseInt(args[1])) },
            { name: 'CLEARALL', func: () => clearAllCells() },
            { name: 'REPLACEALL', func: (args) => replaceAllCells(parseInt(args[0])) },
            { name: 'RANDOMIZE', func: () => randomizeCells() },
            { name: 'SUM', func: (args) => calculateSum(parseInt(args[0]), parseInt(args[1])) },
            { name: 'AVERAGE', func: (args) => calculateAverage(parseInt(args[0]), parseInt(args[1])) },
            { name: 'MAX', func: () => findMax() },
            { name: 'MIN', func: () => findMin() },
            { name: 'GPIOSET', func: (args) => setGPIOValue(parseInt(args[0]), parseInt(args[1])) },
            { name: 'GPIOGET', func: (args) => getGPIOValue(parseInt(args[0])) }
        ];

        function generateTable(rows, cols) {
            const tableContainer = document.getElementById('tableContainer');
            const table = document.createElement('table');
            let index = 0;
            for (let i = 0; i < rows; i++) {
                const tr = document.createElement('tr');
                for (let j = 0; j < cols; j++) {
                    const td = document.createElement('td');
                    td.textContent = '0';
                    td.setAttribute('data-index', index);
                    tr.appendChild(td);
                    index++;
                }
                table.appendChild(tr);
            }
            tableContainer.appendChild(table);
        }

        function generateInstructionTable(instructions) {
            const instructionTableContainer = document.getElementById('instructionTableContainer');
            const table = document.createElement('table');
            table.className = 'instruction-table';
            const tr = document.createElement('tr');
            instructions.forEach((instruction, index) => {
                const td = document.createElement('td');
                td.textContent = index;
                td.setAttribute('data-instruction', instruction.name);
                tr.appendChild(td);
            });
            table.appendChild(tr);
            instructionTableContainer.appendChild(table);
        }

        function generateGPIOTable() {
            const gpioTableContainer = document.getElementById('gpioTableContainer');
            const table = document.createElement('table');
            const tr = document.createElement('tr');
            for (let i = 0; i < 8; i++) {
                const td = document.createElement('td');
                td.textContent = '0';
                td.setAttribute('data-gpio', i);
                tr.appendChild(td);
            };
            table.appendChild(tr);
            gpioTableContainer.appendChild(table);
        }

        function setCellValue(index, value) {
            const cells = document.querySelectorAll('#tableContainer td');
            if (index >= 0 && index < cells.length) {
                cells[index].textContent = value;
            } else {
                console.log('Invalid cell index. Please enter a valid index.');
            }
        }

        function getCellValue(index) {
            const cells = document.querySelectorAll('#tableContainer td');
            if (index >= 0 && index < cells.length) {
                console.log(`Value in cell ${index + 1}: ${cells[index].textContent}`);
            } else {
                console.log('Invalid cell index. Please enter a valid index.');
            }
        }

        function clearCellValue(index) {
            const cells = document.querySelectorAll('#tableContainer td');
            if (index >= 0 && index < cells.length) {
                cells[index].textContent = '0';
            } else {
                console.log('Invalid cell index. Please enter a valid index.');
            }
        }

        function incrementCellValue(index) {
            const cells = document.querySelectorAll('#tableContainer td');
            if (index >= 0 && index < cells.length) {
                let currentValue = parseInt(cells[index].textContent);
                cells[index].textContent = currentValue + 1;
            } else {
                console.log('Invalid cell index. Please enter a valid index.');
            }
        }

        function decrementCellValue(index) {
            const cells = document.querySelectorAll('#tableContainer td');
            if (index >= 0 && index < cells.length) {
                let currentValue = parseInt(cells[index].textContent);
                cells[index].textContent = currentValue - 1;
            } else {
                console.log('Invalid cell index. Please enter a valid index.');
            }
        }

        function swapCells(index1, index2) {
            const cells = document.querySelectorAll('#tableContainer td');
            if (index1 >= 0 && index1 < cells.length && index2 >= 0 && index2 < cells.length) {
                let temp = cells[index1].textContent;
                cells[index1].textContent = cells[index2].textContent;
                cells[index2].textContent = temp;
            } else {
                console.log('Invalid cell indices. Please enter valid indices.');
            }
        }

        function addCellValue(index, value) {
            const cells = document.querySelectorAll('#tableContainer td');
            if (index >= 0 && index < cells.length) {
                let currentValue = parseInt(cells[index].textContent);
                cells[index].textContent = currentValue + value;
            } else {
                console.log('Invalid cell index. Please enter a valid index.');
            }
        }

        function subtractCellValue(index, value) {
            const cells = document.querySelectorAll('#tableContainer td');
            if (index >= 0 && index < cells.length) {
                let currentValue = parseInt(cells[index].textContent);
                cells[index].textContent = currentValue - value;
            } else {
                console.log('Invalid cell index. Please enter a valid index.');
            }
        }

        function multiplyCellValue(index, value) {
            const cells = document.querySelectorAll('#tableContainer td');
            if (index >= 0 && index < cells.length) {
                let currentValue = parseInt(cells[index].textContent);
                cells[index].textContent = currentValue * value;
            } else {
                console.log('Invalid cell index. Please enter a valid index.');
            }
        }

        function divideCellValue(index, value) {
            const cells = document.querySelectorAll('#tableContainer td');
            if (index >= 0 && index < cells.length) {
                let currentValue = parseInt(cells[index].textContent);
                cells[index].textContent = Math.floor(currentValue / value);
            } else {
                console.log('Invalid cell index. Please enter a valid index.');
            }
        }

        function clearAllCells() {
            const cells = document.querySelectorAll('#tableContainer td');
            cells.forEach(cell => {
                cell.textContent = '0';
            });
        }

        function replaceAllCells(value) {
            const cells = document.querySelectorAll('#tableContainer td');
            cells.forEach(cell => {
                cell.textContent = value;
            });
        }

        function randomizeCells() {
            const cells = document.querySelectorAll('#tableContainer td');
            cells.forEach(cell => {
                cell.textContent = Math.floor(Math.random() * 101);
            });
        }

        function calculateSum(startIndex, endIndex) {
            const cells = document.querySelectorAll('#tableContainer td');
            let sum = 0;
            for (let i = startIndex; i <= endIndex; i++) {
                if (i >= 0 && i < cells.length) {
                    sum += parseInt(cells[i].textContent);
                }
            }
            console.log(`Sum of cells from ${startIndex + 1} to ${endIndex + 1}: ${sum}`);
        }

        function calculateAverage(startIndex, endIndex) {
            const cells = document.querySelectorAll('#tableContainer td');
            let sum = 0;
            let count = 0;
            for (let i = startIndex; i <= endIndex; i++) {
                if (i >= 0 && i < cells.length) {
                    sum += parseInt(cells[i].textContent);
                    count++;
                }
            }
            let average = count > 0 ? sum / count : 0;
            console.log(`Average of cells from ${startIndex + 1} to ${endIndex + 1}: ${average}`);
        }

        function findMax() {
            const cells = document.querySelectorAll('#tableContainer td');
            let max = Number.MIN_SAFE_INTEGER;
            cells.forEach(cell => {
                let value = parseInt(cell.textContent);
                if (value > max) {
                    max = value;
                }
            });
            console.log(`Maximum value in cells: ${max}`);
        }

        function findMin() {
            const cells = document.querySelectorAll('#tableContainer td');
            let min = Number.MAX_SAFE_INTEGER;
            cells.forEach(cell => {
                let value = parseInt(cell.textContent);
                if (value < min) {
                    min = value;
                }
            });
            console.log(`Minimum value in cells: ${min}`);
        }

        function setGPIOValue(index, value) {
            const gpios = document.querySelectorAll('#gpioTableContainer td');
            if (index >= 0 && index < gpios.length) {
                gpios[index].textContent = value;
            } else {
                console.log('Invalid GPIO index. Please enter a valid index.');
            }
        }

        function getGPIOValue(index) {
            const gpios = document.querySelectorAll('#gpioTableContainer td');
            if (index >= 0 && index < gpios.length) {
                console.log(`Value in GPIO ${index}: ${gpios[index].textContent}`);
            } else {
                console.log('Invalid GPIO index. Please enter a valid index.');
            }
        }

        function executeCommand(command) {
            const parts = command.trim().split(' ');
            const opcode = parseInt(parts[0]);

            if (isNaN(opcode) || opcode < 0 || opcode >= instructionSet.length) {
                console.log(`Invalid opcode: ${opcode}`);
                return;
            }

            const args = parts.slice(1);
            instructionSet[opcode].func(args);
        }

        function executeCommands(commands) {
            const lines = commands.split('\n');
            lines.forEach(line => {
                const trimmedLine = line.trim();
                if (trimmedLine && !trimmedLine.startsWith('#')) {
                    executeCommand(trimmedLine);
                }
            });
        }

        document.getElementById('executeButton').addEventListener('click', () => {
            const commands = document.getElementById('commandInput').value;
            executeCommands(commands);
        });

        generateTable(9, 12);
        generateInstructionTable(instructionSet);
        generateGPIOTable();
    </script>
</body>

</html>
