<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Block Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .memory-block {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 800px; /* Adjust width as needed */
        }

        .memory-cell {
            width: 80px;
            height: 40px;
            background-color: #ffffff;
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .memory-cell:hover {
            background-color: #e0e0e0;
        }

        .memory-select {
            margin-left: 20px;
            padding: 20px;
            background-color: #ffffff;
            border: 1px solid #ccc;
            width: 200px;
        }

        .memory-select h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .memory-select p {
            font-size: 14px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="memory-block">
        <!-- Memory cells with realistic names -->
        <div class="memory-cell" id="cell0">Temperature</div>
        <div class="memory-cell" id="cell1">Pressure</div>
        <div class="memory-cell" id="cell2">Humidity</div>
        <div class="memory-cell" id="cell3">Speed</div>
        <div class="memory-cell" id="cell4">Acceleration</div>
        <div class="memory-cell" id="cell5">Voltage</div>
        <div class="memory-cell" id="cell6">Current</div>
        <div class="memory-cell" id="cell7">Frequency</div>
        <div class="memory-cell" id="cell8">Sound Level</div>
        <div class="memory-cell" id="cell9">Light Intensity</div>
        <div class="memory-cell" id="cell10">Position X</div>
        <div class="memory-cell" id="cell11">Position Y</div>
        <div class="memory-cell" id="cell12">Rotation</div>
        <div class="memory-cell" id="cell13">Pressure 2</div>
        <div class="memory-cell" id="cell14">Temperature 2</div>
        <div class="memory-cell" id="cell15">Humidity 2</div>
        <div class="memory-cell" id="cell16">Speed 2</div>
        <div class="memory-cell" id="cell17">Acceleration 2</div>
        <div class="memory-cell" id="cell18">Voltage 2</div>
        <div class="memory-cell" id="cell19">Current 2</div>
    </div>
    <div class="memory-select">
        <h2>Memory Select</h2>
        <p id="memory-address">Memory Address: </p>
        <p id="memory-value">Memory Value: </p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cells = document.querySelectorAll('.memory-cell');
            const memoryAddressDisplay = document.getElementById('memory-address');
            const memoryValueDisplay = document.getElementById('memory-value');

            cells.forEach(cell => {
                cell.addEventListener('click', function() {
                    // Get memory address from cell ID
                    let memoryAddress = parseInt(this.id.replace('cell', ''));

                    // Simulate getting memory value (can be replaced with actual logic)
                    let memoryValue = 'Value at ' + this.textContent.trim();

                    // Display memory address and value
                    memoryAddressDisplay.textContent = 'Memory Address: ' + memoryAddress;
                    memoryValueDisplay.textContent = 'Memory Value: ' + memoryValue;
                });
            });
        });
    </script>
</body>
</html>
