<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Recognition App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Learn Shapes!</h1>
    <div id="shape-container">
        <div id="shape-display">Select a Shape</div>
        <div id="shape-buttons">
            <!-- Buttons for shapes will be inserted here by JavaScript -->
        </div>
    </div>
    <div id="drawing-area">
        <h2>Draw the Shape</h2>
        <canvas id="drawing-canvas"></canvas>
        <button id="clear-canvas">Clear Canvas</button>
        <button id="check-shape">Check Shape</button>
    </div>
    <div id="feedback"></div>
    <script src="script.js"></script>
</body>
</html>
