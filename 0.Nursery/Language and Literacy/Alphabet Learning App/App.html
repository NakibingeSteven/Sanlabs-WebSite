<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet Learning App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Alphabet Learning</h1>
        <div class="letter-grid" id="letterGrid">
            <!-- Letters A-Z will be generated here -->
        </div>

        <div class="letter-detail" id="letterDetail">
            <h2 id="selectedLetter">A</h2>
            <img src="apple.png" alt="Apple" class="image" id="letterImage">
            <button class="sound-btn" onclick="playSound()">Hear Sound</button>
            <button class="trace-btn" onclick="startTracing()">Trace Letter</button>
            <div class="tracing" id="tracingArea">
                <canvas id="tracingCanvas" width="300" height="200"></canvas>
            </div>
            <button class="back-btn" onclick="goBack()">Back</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
