<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

.grid-container {
  display: grid;
  grid-template-columns: auto;
  grid-gap: 10px;
  background-color: #2196F3;
  padding: 10px;
}
.grid-container > div {
  background-color: rgba(255, 255, 255, 0.8);
  text-align: center;
  padding: 20px 0;
  font-size: 30px;
}
</style>
</head>

<body>
  <div class="grid-container">
    <div id="myCard"></div>
  </div>

<button type="button" onclick="plusSlides(-1)">❮</button>
<button type="button" onclick="plusSlides(1)">❯</button>

<script>
let cardIndex = -1;
let card = document.getElementById("myCard");
let cards = ["Ant", "Bee", "C","Deer", "Eagle", "Frog","Goat", "Horse", "I","J", "K", "L","M", "N", "O","P", "Q", "Rat","Snake", "T", "U","Vulture", "W", "X","Y", "Zebra"];
showCard(cardIndex);

function plusSlides(n) {
  showCard(cardIndex += n);
}
function showCard(n) {
  var i;
  //get display div
  cardIndex++;
  if (n > cards.length) {cardIndex = 1}    
  if (n < 1) {cardIndex = cards.length}
  card.innerHTML =  cards[cardIndex-1];
}
</script>
</body>
</html>
